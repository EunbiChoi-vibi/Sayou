        </Card>

        <Card>
          {current.entries.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{projectName}에 등록된 견적서가 없습니다.</div>
          ) : (
            <>
              {[...current.entries].sort((a, b) => (a.date < b.date ? 1 : -1)).map((e, i, arr) => (
                <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "14px 16px", borderBottom: `1px solid ${DASH.line}` }}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontSize: 13.5, fontWeight: 700, color: DASH.ink }}>{e.title}</div>
                    <div style={{ fontSize: 11.5, color: DASH.inkFaint }}>{fmtYMDLabel(e.date)}{e.memo ? ` · ${e.memo}` : ""}</div>
                  </div>
                  <div style={{ fontSize: 15, fontWeight: 700, color: DASH.brass, fontFamily: "'Noto Serif KR', serif" }}>{(Number(e.amount) || 0).toLocaleString("ko-KR")}원</div>
                  {e.link && <a href={e.link} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: DASH.blue }}>🔗</a>}
                  <StageDeleteBtn onClick={() => removeEntry(e.id)} />
                </div>
              ))}
              <div style={{ display: "flex", justifyContent: "space-between", padding: "14px 16px", fontSize: 13.5, fontWeight: 700, color: DASH.navy }}>
                <span>합계</span>
                <span>{total.toLocaleString("ko-KR")}원</span>
              </div>
            </>
          )}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================================
   계약 — 계약 체크리스트 · 계약 내용 기록
   ============================================================================ */

const DEFAULT_CONTRACT_CHECKLIST = ["계약서 날인 완료", "계약금 입금 확인", "세금계산서 발행", "착공일자 확정", "도면/견적서 첨부 확인", "특약사항 명시 확인"];

function defaultContractProject() {
  return { checklist: DEFAULT_CONTRACT_CHECKLIST.map((label) => ({ id: makeStageId(), label, done: false })), entries: [] };
}

function ContractPage({ onBack }) {
  const [store, setStore, loaded, saveStatus] = useProjectStore(CONTRACT_STORAGE_KEY, {});
  const [projectName, setProjectName] = useState(ALL_PROJECT_NAMES[0] || "새 프로젝트");
  const [draft, setDraft] = useState({ date: STAGE_TODAY, content: "" });
  const [newChecklistItem, setNewChecklistItem] = useState("");

  useEffect(() => {
    if (loaded && projectName && !store[projectName]) {
      setStore((prev) => ({ ...prev, [projectName]: defaultContractProject() }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectName, loaded]);

  const current = store[projectName] || defaultContractProject();
  function update(updater) { setStore((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultContractProject()) })); }

  function toggleChecklist(id) { update((proj) => ({ ...proj, checklist: proj.checklist.map((c) => (c.id === id ? { ...c, done: !c.done } : c)) })); }
  function removeChecklist(id) { update((proj) => ({ ...proj, checklist: proj.checklist.filter((c) => c.id !== id) })); }
  function addChecklist() {
    if (!newChecklistItem.trim()) return;
    update((proj) => ({ ...proj, checklist: [...proj.checklist, { id: makeStageId(), label: newChecklistItem.trim(), done: false }] }));
    setNewChecklistItem("");
  }
  function addEntry() {
    if (!draft.content.trim()) return;
    update((proj) => ({ ...proj, entries: [...proj.entries, { id: makeStageId(), date: draft.date, content: draft.content.trim() }] }));
    setDraft({ date: STAGE_TODAY, content: "" });
  }
  function removeEntry(id) {
    const target = current.entries.find((e) => e.id === id);
    update((proj) => ({ ...proj, entries: proj.entries.filter((e) => e.id !== id) }));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }

  const doneCount = current.checklist.filter((c) => c.done).length;

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-contract-v1", NOTION_DB_CONTRACT, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const checklistSummary = `${current.checklist.filter((c) => c.done).length}/${current.checklist.length} 완료`;
    const justPushedIds = [];
    for (const e of current.entries) {
      const props = {
        "이름": notionTitleProp(`${projectName} 계약 (${e.date})`),
        "프로젝트명": notionSelectProp(projectName),
        "계약일": notionDateRangeProp(e.date, e.date),
        "내용": notionTextProp(e.content),
        "체크리스트요약": notionTextProp(checklistSummary),
      };
      if (e.notionPageId) {
        await notionUpdatePage(workerUrl, e.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        update((proj) => ({ ...proj, entries: proj.entries.map((x) => (x.id === e.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.entries.map((e) => e.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const newEntries = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["계약일"]);
      newEntries.push({ id: makeStageId(), date: range ? range.start.slice(0, 10) : STAGE_TODAY, content: notionPlainText(props["내용"]), notionPageId: page.id });
      pulled++;
    });
    if (newEntries.length) update((proj) => ({ ...proj, entries: [...proj.entries, ...newEntries] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="Contract" title="계약" desc="계약 체크리스트를 확인하고 계약 내용을 기록하세요." />
          <SaveStatusText status={saveStatus} />
        </div>

        <ProjectPicker projectName={projectName} setProjectName={setProjectName} extraNames={Object.keys(store)} />

        <div style={{ marginBottom: 14 }}><NotionStatusBadge sync={notionSync} /></div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy }}>계약 체크리스트</div>
            <span style={{ fontSize: 11.5, color: DASH.inkFaint }}>{doneCount}/{current.checklist.length} 완료</span>
          </div>
          {current.checklist.map((c) => (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0" }}>
              <span onClick={() => toggleChecklist(c.id)} style={{ width: 16, height: 16, borderRadius: 5, border: "1.6px solid #B9C0BC", cursor: "pointer", background: c.done ? DASH.teal : "transparent", flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 13, color: DASH.ink, textDecoration: c.done ? "line-through" : "none" }}>{c.label}</span>
              <StageDeleteBtn onClick={() => removeChecklist(c.id)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
            <input value={newChecklistItem} onChange={(e) => setNewChecklistItem(e.target.value)} placeholder="체크 항목 추가" style={{ ...stageInputStyle, flex: 1 }} />
            <button onClick={addChecklist} style={{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.navy }}>+ 추가</button>
          </div>
        </Card>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>계약 내용 기록 추가</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
            <input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={stageInputStyle} />
          </div>
          <textarea value={draft.content} onChange={(e) => setDraft({ ...draft, content: e.target.value })} placeholder="계약 조건, 특약사항 등" style={stageTextareaStyle} />
          <button onClick={addEntry} style={{ marginTop: 8, fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 기록 추가</button>
        </Card>

        <Card>
          {current.entries.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{projectName}의 계약 기록이 없습니다.</div>
          ) : [...current.entries].sort((a, b) => (a.date < b.date ? 1 : -1)).map((e, i, arr) => (
            <div key={e.id} style={{ display: "flex", gap: 12, padding: "14px 16px", borderBottom: i === arr.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: DASH.brass, minWidth: 90 }}>{fmtYMDLabel(e.date)}</div>
              <div style={{ flex: 1, fontSize: 13, color: DASH.ink, lineHeight: 1.5 }}>{e.content}</div>
              <StageDeleteBtn onClick={() => removeEntry(e.id)} />
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================================
   시공 — 프로젝트별 공종별 체크리스트 + 개선사항
   ============================================================================ */

const DEFAULT_CONSTRUCTION_ITEMS = ["자재 반입 확인", "시공 상태 확인", "안전 조치 확인", "마감 상태 확인"];

function defaultConstructionProject() {
  const checklist = {};
  STANDARD_PROCESS_TYPES.forEach((t) => {
    checklist[t] = DEFAULT_CONSTRUCTION_ITEMS.map((label) => ({ id: makeStageId(), label, done: false }));
  });
  return { checklist, improvements: [] };
}

function ConstructionPage({ onBack }) {
  const [store, setStore, loaded, saveStatus] = useProjectStore(CONSTRUCTION_STORAGE_KEY, {});
  const [projectName, setProjectName] = useState(ALL_PROJECT_NAMES[0] || "새 프로젝트");
  const [activeTrade, setActiveTrade] = useState(STANDARD_PROCESS_TYPES[0]);
  const [newChecklistItem, setNewChecklistItem] = useState("");
  const [draft, setDraft] = useState({ type: STANDARD_PROCESS_TYPES[0], issue: "", date: STAGE_TODAY, status: "접수" });

  useEffect(() => {
    if (loaded && projectName && !store[projectName]) {
      setStore((prev) => ({ ...prev, [projectName]: defaultConstructionProject() }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectName, loaded]);

  const current = store[projectName] || defaultConstructionProject();
  function update(updater) { setStore((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultConstructionProject()) })); }

  const tradeList = current.checklist[activeTrade] || [];
  function toggleItem(id) {
    update((proj) => ({ ...proj, checklist: { ...proj.checklist, [activeTrade]: (proj.checklist[activeTrade] || []).map((c) => (c.id === id ? { ...c, done: !c.done } : c)) } }));
  }
  function removeItem(id) {
    const target = tradeList.find((c) => c.id === id);
    update((proj) => ({ ...proj, checklist: { ...proj.checklist, [activeTrade]: (proj.checklist[activeTrade] || []).filter((c) => c.id !== id) } }));
    if (target && target.notionPageId) checklistNotionSync.archivePage(target.notionPageId);
  }
  function addItem() {
    if (!newChecklistItem.trim()) return;
    update((proj) => ({ ...proj, checklist: { ...proj.checklist, [activeTrade]: [...(proj.checklist[activeTrade] || []), { id: makeStageId(), label: newChecklistItem.trim(), done: false }] } }));
    setNewChecklistItem("");
  }

  function addImprovement() {
    if (!draft.issue.trim()) return;
    update((proj) => ({ ...proj, improvements: [...proj.improvements, { id: makeStageId(), type: draft.type, issue: draft.issue.trim(), date: draft.date, status: draft.status }] }));
    setDraft({ ...draft, issue: "" });
  }
  function removeImprovement(id) {
    const target = current.improvements.find((x) => x.id === id);
    update((proj) => ({ ...proj, improvements: proj.improvements.filter((x) => x.id !== id) }));
    if (target && target.notionPageId) improvementNotionSync.archivePage(target.notionPageId);
  }

  const doneCount = tradeList.filter((c) => c.done).length;

  const checklistNotionSync = useNotionAutoSync("interior-dashboard-notion-db-construction-checklist-v1", NOTION_DB_CONSTRUCTION_CHECKLIST, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const trade of STANDARD_PROCESS_TYPES) {
      const items = current.checklist[trade] || [];
      for (const it of items) {
        const props = {
          "이름": notionTitleProp(it.label),
          "프로젝트명": notionSelectProp(projectName),
          "공종": notionSelectProp(trade),
          "완료": { checkbox: !!it.done },
        };
        if (it.notionPageId) {
          await notionUpdatePage(workerUrl, it.notionPageId, props);
          updated++;
        } else {
          const page = await notionCreatePage(workerUrl, databaseId, props);
          update((proj) => ({ ...proj, checklist: { ...proj.checklist, [trade]: (proj.checklist[trade] || []).map((x) => (x.id === it.id ? { ...x, notionPageId: page.id } : x)) } }));
          justPushedIds.push(page.id);
          pushed++;
        }
      }
    }
    const known = new Set([...STANDARD_PROCESS_TYPES.flatMap((t) => (current.checklist[t] || []).map((c) => c.notionPageId)).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const additions = {};
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const trade = notionPlainText(props["공종"]);
      if (!STANDARD_PROCESS_TYPES.includes(trade)) return;
      (additions[trade] = additions[trade] || []).push({ id: makeStageId(), label: notionPlainText(props["이름"]), done: props["완료"]?.checkbox || false, notionPageId: page.id });
      pulled++;
    });
    if (pulled > 0) {
      update((proj) => {
        const nextChecklist = { ...proj.checklist };
        Object.keys(additions).forEach((trade) => { nextChecklist[trade] = [...(nextChecklist[trade] || []), ...additions[trade]]; });
        return { ...proj, checklist: nextChecklist };
      });
    }
    return { pushed, pulled, updated };
  });

  const improvementNotionSync = useNotionAutoSync("interior-dashboard-notion-db-construction-improvement-v1", NOTION_DB_CONSTRUCTION_IMPROVEMENT, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const x of current.improvements) {
      const props = {
        "이름": notionTitleProp(x.issue),
        "프로젝트명": notionSelectProp(projectName),
        "공종": notionSelectProp(x.type),
        "날짜": notionDateRangeProp(x.date, x.date),
        "상태": notionSelectProp(x.status),
      };
      if (x.notionPageId) {
        await notionUpdatePage(workerUrl, x.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        update((proj) => ({ ...proj, improvements: proj.improvements.map((y) => (y.id === x.id ? { ...y, notionPageId: page.id } : y)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.improvements.map((x) => x.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const newItems = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["날짜"]);
      newItems.push({ id: makeStageId(), type: notionPlainText(props["공종"]) || "기타", issue: notionPlainText(props["이름"]), date: range ? range.start.slice(0, 10) : STAGE_TODAY, status: notionPlainText(props["상태"]) || "접수", notionPageId: page.id });
      pulled++;
    });
    if (newItems.length) update((proj) => ({ ...proj, improvements: [...proj.improvements, ...newItems] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 1000, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="Construction" title="시공" desc="공종별 시공 체크리스트를 확인하고, 개선이 필요한 사항을 관리하세요." />
          <SaveStatusText status={saveStatus} />
        </div>

        <ProjectPicker projectName={projectName} setProjectName={setProjectName} extraNames={Object.keys(store)} />

        <div style={{ marginBottom: 14, display: "flex", gap: 16 }}>
          <NotionStatusBadge sync={checklistNotionSync} />
          <NotionStatusBadge sync={improvementNotionSync} />
        </div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy }}>공종별 체크리스트</div>
            <span style={{ fontSize: 11.5, color: DASH.inkFaint }}>{doneCount}/{tradeList.length} 완료</span>
          </div>
          <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginBottom: 12 }}>
            {STANDARD_PROCESS_TYPES.map((t) => (
              <button key={t} onClick={() => setActiveTrade(t)} style={{ fontSize: 12, fontWeight: 600, padding: "6px 12px", borderRadius: 100, border: `1px solid ${activeTrade === t ? DASH.navy : DASH.line}`, background: activeTrade === t ? DASH.navy : DASH.surface, color: activeTrade === t ? "#fff" : DASH.inkSoft }}>{t}</button>
            ))}
          </div>
          {tradeList.map((c) => (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0" }}>
              <span onClick={() => toggleItem(c.id)} style={{ width: 16, height: 16, borderRadius: 5, border: "1.6px solid #B9C0BC", cursor: "pointer", background: c.done ? DASH.teal : "transparent", flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 13, color: DASH.ink, textDecoration: c.done ? "line-through" : "none" }}>{c.label}</span>
              <StageDeleteBtn onClick={() => removeItem(c.id)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
            <input value={newChecklistItem} onChange={(e) => setNewChecklistItem(e.target.value)} placeholder={`${activeTrade} 체크 항목 추가`} style={{ ...stageInputStyle, flex: 1 }} />
            <button onClick={addItem} style={{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.navy }}>+ 추가</button>
          </div>
        </Card>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>개선사항 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 2fr 1fr 1fr auto", gap: 8 }}>
            <select value={draft.type} onChange={(e) => setDraft({ ...draft, type: e.target.value })} style={stageInputStyle}>
              {STANDARD_PROCESS_TYPES.map((t) => <option key={t} value={t}>{t}</option>)}
            </select>
            <input value={draft.issue} onChange={(e) => setDraft({ ...draft, issue: e.target.value })} placeholder="개선사항/이슈 내용" style={stageInputStyle} />
            <input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={stageInputStyle} />
            <select value={draft.status} onChange={(e) => setDraft({ ...draft, status: e.target.value })} style={stageInputStyle}>
              <option value="접수">접수</option>
              <option value="처리중">처리중</option>
              <option value="완료">완료</option>
            </select>
            <button onClick={addImprovement} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 14px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 추가</button>
          </div>
        </Card>

        <Card>
          {current.improvements.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>등록된 개선사항이 없습니다.</div>
          ) : [...current.improvements].sort((a, b) => (a.date < b.date ? 1 : -1)).map((x, i, arr) => (
            <div key={x.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "13px 16px", borderBottom: i === arr.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 100, background: DASH.blueSoft, color: DASH.blue }}>{x.type}</span>
              <div style={{ flex: 1, fontSize: 13, color: DASH.ink }}>{x.issue}</div>
              <span style={{ fontSize: 10.5, color: DASH.inkFaint }}>{fmtYMDLabel(x.date)}</span>
              <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 100, background: x.status === "완료" ? DASH.tealSoft : x.status === "처리중" ? DASH.amberSoft : DASH.blueSoft, color: x.status === "완료" ? DASH.teal : x.status === "처리중" ? DASH.amber : DASH.blue }}>{x.status}</span>
              <StageDeleteBtn onClick={() => removeImprovement(x.id)} />
            </div>
          ))}
        </Card>

/* ============================================================================
   AS — 프로젝트별 AS 일정 등록 (구글 캘린더 · 노션 동기화)
   ============================================================================ */

function defaultAsProject() { return { entries: [] }; }

function AsPage({ onBack }) {
  const [store, setStore, loaded, saveStatus] = useProjectStore(AS_STORAGE_KEY, {});
  const [projectName, setProjectName] = useState(ALL_PROJECT_NAMES[0] || "새 프로젝트");
  const [draft, setDraft] = useState({ title: "", date: STAGE_TODAY, endDate: STAGE_TODAY, note: "" });
  const googleSyncRef = useRef(null);

  useEffect(() => {
    if (loaded && projectName && !store[projectName]) {
      setStore((prev) => ({ ...prev, [projectName]: defaultAsProject() }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectName, loaded]);

  const current = store[projectName] || defaultAsProject();
  function update(updater) { setStore((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultAsProject()) })); }

  function addEntry() {
    if (!draft.title.trim()) return;
    const endDate = draft.endDate && draft.endDate >= draft.date ? draft.endDate : draft.date;
    update((proj) => ({ entries: [...proj.entries, { id: makeStageId(), title: draft.title.trim(), date: draft.date, endDate, note: draft.note.trim() }] }));
    setDraft({ title: "", date: STAGE_TODAY, endDate: STAGE_TODAY, note: "" });
  }
  function removeEntry(id) {
    const target = current.entries.find((e) => e.id === id);
    update((proj) => ({ entries: proj.entries.filter((e) => e.id !== id) }));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
    if (target && target.googleEventId) googleSyncRef.current?.deleteEvent(target.googleEventId);
  }

  // GoogleSyncPanel이 기대하는 {tasks, periodStart, periodEnd} 모양으로 어댑팅
  const gCurrent = {
    tasks: current.entries.map((e) => ({ id: e.id, type: "AS", label: `${projectName} - ${e.title}`, date: e.date, endDate: e.endDate, googleEventId: e.googleEventId })),
    periodStart: current.entries.length ? current.entries.reduce((m, e) => (e.date < m ? e.date : m), current.entries[0].date) : STAGE_TODAY,
    periodEnd: current.entries.length ? current.entries.reduce((m, e) => (e.endDate > m ? e.endDate : m), current.entries[0].endDate) : STAGE_TODAY,
  };
  function gUpdateCurrent(updater) {
    const updated = updater(gCurrent);
    update((proj) => {
      const byId = new Map(proj.entries.map((e) => [e.id, e]));
      const nextEntries = updated.tasks.map((t) => {
        const existing = byId.get(t.id);
        if (existing) return { ...existing, googleEventId: t.googleEventId };
        return { id: t.id, title: t.label, date: t.date, endDate: t.endDate, note: "", googleEventId: t.googleEventId };
      });
      return { entries: nextEntries };
    });
  }

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-as-v1", NOTION_DB_AS, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const e of current.entries) {
      const props = {
        "이름": notionTitleProp(`${projectName} - ${e.title}`),
        "프로젝트명": notionSelectProp(projectName),
        "일정": notionDateRangeProp(e.date, e.endDate),
        "메모": notionTextProp(e.note),
      };
      if (e.notionPageId) {
        await notionUpdatePage(workerUrl, e.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        update((proj) => ({ entries: proj.entries.map((x) => (x.id === e.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.entries.map((e) => e.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const newEntries = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["일정"]);
      if (!range || !range.start) return;
      newEntries.push({ id: makeStageId(), title: notionPlainText(props["이름"]) || "(제목 없음)", date: range.start.slice(0, 10), endDate: (range.end || range.start).slice(0, 10), note: notionPlainText(props["메모"]), notionPageId: page.id });
      pulled++;
    });
    if (newEntries.length) update((proj) => ({ entries: [...proj.entries, ...newEntries] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="After Service" title="AS" desc="프로젝트별 진행 중인 AS 일정을 등록하세요. 일정을 추가하고 아래에서 동기화하면 구글 캘린더에도 반영됩니다." />
          <SaveStatusText status={saveStatus} />
        </div>

        <ProjectPicker projectName={projectName} setProjectName={setProjectName} extraNames={Object.keys(store)} />

        <GoogleSyncPanel ref={googleSyncRef} current={gCurrent} updateCurrent={gUpdateCurrent} periodFallbackStart={STAGE_TODAY} periodFallbackEnd={STAGE_TODAY} />

        <div style={{ marginBottom: 14 }}><NotionStatusBadge sync={notionSync} /></div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>AS 일정 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.4fr 1fr 1fr", gap: 8, marginBottom: 8 }}>
            <input value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} placeholder="AS 내용 (예: 조명 스위치 교체)" style={stageInputStyle} />
            <input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={stageInputStyle} />
            <input type="date" value={draft.endDate} onChange={(e) => setDraft({ ...draft, endDate: e.target.value })} min={draft.date} style={stageInputStyle} />
          </div>
          <input value={draft.note} onChange={(e) => setDraft({ ...draft, note: e.target.value })} placeholder="메모" style={{ ...stageInputStyle, width: "100%" }} />
          <button onClick={addEntry} style={{ marginTop: 10, fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ AS 일정 추가</button>
        </Card>

        <Card>
          {current.entries.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{projectName}에 등록된 AS 일정이 없습니다.</div>
          ) : [...current.entries].sort((a, b) => (a.date < b.date ? 1 : -1)).map((e, i, arr) => (
            <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", borderBottom: i === arr.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <div style={{ fontSize: 12, fontWeight: 700, color: DASH.brass, minWidth: 130 }}>{fmtYMDLabel(e.date)}{e.endDate !== e.date ? ` ~ ${fmtYMDLabel(e.endDate)}` : ""}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: DASH.ink }}>{e.title}</div>
                {e.note && <div style={{ fontSize: 11.5, color: DASH.inkSoft }}>{e.note}</div>}
              </div>
              {e.googleEventId && <span style={{ fontSize: 10, fontWeight: 700, padding: "2px 8px", borderRadius: 100, background: DASH.tealSoft, color: DASH.teal }}>캘린더 반영됨</span>}
              <StageDeleteBtn onClick={() => removeEntry(e.id)} />
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================================
   프로젝트별 보기 — 한 프로젝트의 전 단계 데이터를 한 화면에서 조회
   ============================================================================ */

const BYPROJECT_STORE_KEYS = [CONSULT_STORAGE_KEY, MEASURE_STORAGE_KEY, PROPOSAL_STORAGE_KEY, ESTIMATE_STORAGE_KEY, CONTRACT_STORAGE_KEY, CONSTRUCTION_STORAGE_KEY, AS_STORAGE_KEY, PROJECT_SCHEDULE_STORAGE_KEY];

async function renameProjectEverywhere(oldName, newName) {
  for (const key of BYPROJECT_STORE_KEYS) {
    try {
      const res = await window.storage.get(key, true);
      if (res && res.value) {
        const parsed = JSON.parse(res.value);
        if (parsed && typeof parsed === "object" && Object.prototype.hasOwnProperty.call(parsed, oldName)) {
          const merged = { ...parsed };
          merged[newName] = parsed[newName] ? parsed[newName] : parsed[oldName];
          delete merged[oldName];
          await window.storage.set(key, JSON.stringify(merged), true);
        }
      }
    } catch (e) {
      // key not created yet — nothing to rename there
    }
  }
}

function ByProjectPage({ onBack }) {
  const [projectName, setProjectName] = useState(ALL_PROJECT_NAMES[0] || "");
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [discoveredNames, setDiscoveredNames] = useState([]);
  const [customProjects, setCustomProjects, customLoaded] = useProjectStore(CUSTOM_PROJECTS_STORAGE_KEY, []);
  const [newProjectInput, setNewProjectInput] = useState("");
  const [renaming, setRenaming] = useState(false);
  const [renameInput, setRenameInput] = useState("");
  const [renameBusy, setRenameBusy] = useState(false);

  async function loadAll(name) {
    setLoading(true);
    async function getStore(key) {
      try {
        const res = await window.storage.get(key, true);
        return res && res.value ? JSON.parse(res.value) : {};
      } catch (e) {
        return {};
      }
    }
    const [consult, measure, proposal, estimate, contract, construction, as_, schedules] = await Promise.all(BYPROJECT_STORE_KEYS.map(getStore));
    setDiscoveredNames(Array.from(new Set([consult, measure, proposal, estimate, contract, construction, as_, schedules].flatMap((s) => Object.keys(s)))));
    setData({
      consult: consult[name]?.entries || [],
      measure: measure[name]?.entries || [],
      proposal: proposal[name]?.entries || [],
      estimate: estimate[name]?.entries || [],
      contract: contract[name]?.entries || [],
      construction: construction[name] || { checklist: {}, improvements: [] },
      as: as_[name]?.entries || [],
      schedule: schedules[name]?.tasks || [],
    });
    setLoading(false);
  }

  const [projectStatus, setProjectStatusState] = useState("");
  const [statusBusy, setStatusBusy] = useState(false);

  async function loadStatus(name) {
    try {
      const res = await window.storage.get(PIPELINE_STORAGE_KEY, true);
      const sites = res && res.value ? JSON.parse(res.value) : [];
      const match = Array.isArray(sites) ? sites.find((s) => s.name === name) : null;
      setProjectStatusState(match ? match.stage : "");
    } catch (e) {
      setProjectStatusState("");
    }
  }

  async function setProjectStatus(newStage) {
    setStatusBusy(true);
    try {
      const res = await window.storage.get(PIPELINE_STORAGE_KEY, true);
      let sites = res && res.value ? JSON.parse(res.value) : [];
      if (!Array.isArray(sites)) sites = [];
      const idx = sites.findIndex((s) => s.name === projectName);
      if (idx >= 0) {
        sites = sites.map((s, i) => (i === idx ? { ...s, stage: newStage } : s));
      } else {
        sites = [...sites, { id: makePipelineSiteId(), stage: newStage, name: projectName, addr: "", type: "주거공간", date: "", pm: "" }];
      }
      await window.storage.set(PIPELINE_STORAGE_KEY, JSON.stringify(sites), true);
      setProjectStatusState(newStage);
    } finally {
      setStatusBusy(false);
    }
  }

  useEffect(() => { if (projectName) loadAll(projectName); }, [projectName]);
  useEffect(() => { if (projectName) loadStatus(projectName); }, [projectName]);

  const projectOptions = Array.from(new Set([...ALL_PROJECT_NAMES, ...discoveredNames, ...(customProjects || [])]));

  function addProject() {
    const name = newProjectInput.trim();
    if (!name) return;
    if (!(customProjects || []).includes(name)) {
      setCustomProjects((prev) => [...(prev || []), name]);
    }
    setProjectName(name);
    setNewProjectInput("");
  }

  function startRename() {
    setRenameInput(projectName);
    setRenaming(true);
  }
  function cancelRename() {
    setRenaming(false);
    setRenameInput("");
  }
  async function saveRename() {
    const newName = renameInput.trim();
    if (!newName || newName === projectName) { cancelRename(); return; }
    setRenameBusy(true);
    try {
      await renameProjectEverywhere(projectName, newName);
      setCustomProjects((prev) => {
        const list = (prev || []).filter((p) => p !== projectName);
        return [...list, newName];
      });
      setRenaming(false);
      setRenameInput("");
      setProjectName(newName);
    } finally {
      setRenameBusy(false);
    }
  }

  const estimateTotal = (data?.estimate || []).reduce((s, e) => s + (Number(e.amount) || 0), 0);
  const checklistTotals = data ? Object.values(data.construction.checklist || {}).flat() : [];
  const checklistDone = checklistTotals.filter((c) => c.done).length;

  function MiniRow({ label, value }) {
    return (
      <div style={{ display: "flex", justifyContent: "space-between", padding: "6px 0", fontSize: 12.5 }}>
        <span style={{ color: DASH.inkSoft }}>{label}</span>
        <span style={{ color: DASH.ink, fontWeight: 600 }}>{value}</span>
      </div>
    );
  }

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 1100, margin: "0 auto", padding: "28px 24px 60px" }}>
        <StageHeader onBack={onBack} eyebrow="By Project" title="프로젝트별 보기" desc="한 프로젝트의 상담부터 AS까지 전 단계 기록을 한 화면에서 확인하세요. 프로젝트를 새로 추가하거나 이름을 수정할 수 있어요." />

        <Card style={{ padding: 16, marginBottom: 18 }}>
          <div style={{ display: "flex", alignItems: "flex-end", gap: 10, flexWrap: "wrap" }}>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>프로젝트 선택</label>
              {renaming ? (
                <div style={{ display: "flex", gap: 6 }}>
                  <input value={renameInput} onChange={(e) => setRenameInput(e.target.value)} style={{ fontSize: 13, padding: "9px 12px", borderRadius: 8, border: `1px solid ${DASH.brass}`, background: DASH.surface, color: DASH.ink, minWidth: 220 }} />
                  <button onClick={saveRename} disabled={renameBusy} style={{ fontSize: 12.5, fontWeight: 700, padding: "9px 14px", borderRadius: 8, border: "none", background: DASH.teal, color: "#fff", opacity: renameBusy ? 0.6 : 1 }}>{renameBusy ? "저장 중…" : "저장"}</button>
                  <button onClick={cancelRename} style={{ fontSize: 12.5, fontWeight: 600, padding: "9px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.inkSoft }}>취소</button>
                </div>
              ) : (
                <div style={{ display: "flex", gap: 6 }}>
                  <select value={projectName} onChange={(e) => setProjectName(e.target.value)} style={{ fontSize: 13, padding: "9px 12px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, minWidth: 240 }}>
                    {projectOptions.map((p) => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <button onClick={startRename} disabled={!projectName} style={{ fontSize: 12.5, fontWeight: 600, padding: "9px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.navy }}>✎ 이름 수정</button>
                </div>
              )}
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>새 프로젝트 추가</label>
              <div style={{ display: "flex", gap: 6 }}>
                <input value={newProjectInput} onChange={(e) => setNewProjectInput(e.target.value)} placeholder="프로젝트명 입력" style={{ fontSize: 12.5, padding: "9px 12px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, width: 180 }} />
                <button onClick={addProject} style={{ fontSize: 12.5, fontWeight: 700, padding: "9px 14px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy, whiteSpace: "nowrap" }}>+ 추가</button>
              </div>
            </div>
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>프로젝트 상태 (진행현황 단계)</label>
              <select
                value={projectStatus}
                disabled={statusBusy}
                onChange={(e) => setProjectStatus(e.target.value)}
                style={{ fontSize: 12.5, padding: "9px 12px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, minWidth: 160 }}
              >
                <option value="">미설정</option>
                {PIPELINE_STAGE_ALL.map((s) => <option key={s} value={s}>{s}</option>)}
              </select>
            </div>
          </div>
          <div style={{ marginTop: 10, fontSize: 11, color: DASH.inkFaint, lineHeight: 1.5 }}>
            이름 수정은 상담·실측·제안서·견적·계약·시공·AS·공정표에 저장된 이 프로젝트의 기록을 전부 새 이름으로 옮깁니다. 프로젝트 상태는 "프로젝트 목록"의 진행현황 보드와 그대로 연결되어 있어요.
          </div>
        </Card>

        {loading || !data ? (
          <div style={{ textAlign: "center", color: DASH.inkFaint, padding: 40 }}>불러오는 중…</div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }}>
            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>💬 상담 ({data.consult.length}건)</div>
              {data.consult.slice(-3).map((e) => <MiniRow key={e.id} label={fmtYMDLabel(e.date)} value={e.content?.slice(0, 20) || "-"} />)}
              {data.consult.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>📐 실측 ({data.measure.length}건)</div>
              {data.measure.slice(-3).map((e) => <MiniRow key={e.id} label={fmtYMDLabel(e.date)} value={e.content?.slice(0, 20) || "-"} />)}
              {data.measure.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>📄 제안서 ({data.proposal.length}건)</div>
              {data.proposal.slice(-3).map((e) => <MiniRow key={e.id} label={e.title} value={fmtYMDLabel(e.date)} />)}
              {data.proposal.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>🧾 견적 (합계 {estimateTotal.toLocaleString("ko-KR")}원)</div>
              {data.estimate.slice(-3).map((e) => <MiniRow key={e.id} label={e.title} value={`${(Number(e.amount) || 0).toLocaleString("ko-KR")}원`} />)}
              {data.estimate.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>✍️ 계약 ({data.contract.length}건)</div>
              {data.contract.slice(-3).map((e) => <MiniRow key={e.id} label={fmtYMDLabel(e.date)} value={e.content?.slice(0, 20) || "-"} />)}
              {data.contract.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>🔨 시공 체크리스트 ({checklistDone}/{checklistTotals.length} 완료)</div>
              <MiniRow label="개선사항" value={`${data.construction.improvements.length}건`} />
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>🛠️ AS ({data.as.length}건)</div>
              {data.as.slice(-3).map((e) => <MiniRow key={e.id} label={e.title} value={fmtYMDLabel(e.date)} />)}
              {data.as.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>

            <Card style={{ padding: 16 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>📅 공정표 일정 ({data.schedule.length}건)</div>
              {data.schedule.slice(-3).map((e) => <MiniRow key={e.id} label={e.type} value={e.label?.slice(0, 20) || "-"} />)}
              {data.schedule.length === 0 && <div style={{ fontSize: 12, color: DASH.inkFaint }}>기록 없음</div>}
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

/* ============================================================================
   ROOT APP — 대시보드 ⇄ 모든 화면 전환
   ============================================================================ */

const VIEW_COMPONENTS = {
  toolkit: InteriorToolkit,
  vendors: VendorContacts,
  sites: SitesPage,
  tasks: TasksPage,
  payments: PaymentsPage,
  consult: ConsultPage,
  measure: MeasurePage,
  proposal: ProposalPage,
  estimate: EstimatePage,
  contract: ContractPage,
  construction: ConstructionPage,
  as: AsPage,
  byproject: ByProjectPage,
};

function App() {
  const [view, setView] = useState("dashboard");
  const [me, setMe] = useState(null);
  const [authChecked, setAuthChecked] = useState(false);
  function goBack() { setView("dashboard"); }
  function navigate(key) { setView(key); }

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get(MY_IDENTITY_STORAGE_KEY, false);
        if (!cancelled && r && r.value) {
          const savedUser = JSON.parse(r.value);
          if (savedUser && ALLOWED_EMAILS.includes(savedUser.email)) {
            setMe(savedUser);
          } else {
            // 예전에 로그인했지만 지금은 허용 목록에 없는 계정 — 저장된 로그인 정보를 지웁니다
            await window.storage.delete(MY_IDENTITY_STORAGE_KEY, false).catch(() => {});
          }
        }
      } catch (e) {
        // not logged in on this device yet
      } finally {
        if (!cancelled) setAuthChecked(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  // 로그인된 동안 계속 "지금 접속 중"으로 표시되도록 하는 하트비트 (어느 화면에 있든 계속 작동)
  useEffect(() => {
    if (!me) return;
    let cancelled = false;
    async function heartbeat() {
      try {
        const r = await window.storage.get(PRESENCE_STORAGE_KEY, true);
        const all = r && r.value ? JSON.parse(r.value) : {};
        all[me.email] = { name: me.name, picture: me.picture, lastSeen: Date.now() };
        if (!cancelled) await window.storage.set(PRESENCE_STORAGE_KEY, JSON.stringify(all), true);
      } catch (e) {
        // ignore
      }
    }
    heartbeat();
    const t = setInterval(heartbeat, 20000);
    return () => { cancelled = true; clearInterval(t); };
  }, [me]);

  async function handleLogout() {
    try {
      await window.storage.delete(MY_IDENTITY_STORAGE_KEY, false);
    } catch (e) {
      // ignore
    }
    setMe(null);
  }

  useEffect(() => {
    const style = document.createElement("style");
    style.setAttribute("data-sayou-responsive", "1");
    style.textContent = `
      @media (max-width: 860px) {
        [style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
      }
      @media (max-width: 640px) {
        h1 { font-size: 20px !important; }
      }
    `;
    document.head.appendChild(style);
    return () => { document.head.removeChild(style); };
  }, []);

  if (!authChecked) {
    return <div style={{ minHeight: "100vh", background: DASH.navy }} />;
  }
  if (!me) {
    return <LoginGate onLoggedIn={setMe} />;
  }

  if (view === "schedule") {
    // '일정 · 공정표'는 대시보드 안의 섹션이라, 대시보드로 이동 후 스크롤합니다.
    setTimeout(() => {
      const el = document.getElementById("schedule-section");
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
    return <Dashboard onNavigate={navigate} me={me} onLogout={handleLogout} />;
  }

  const Comp = VIEW_COMPONENTS[view];
  if (Comp) {
    return <Comp onBack={goBack} />;
  }
  return <Dashboard onNavigate={navigate} />;
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
</script>

  <script>
    (function () {
      function showError(err) {
        var el = document.getElementById("boot-error");
        if (el) {
          el.style.display = "block";
          el.textContent = "로딩 중 오류가 발생했습니다: " + (err && err.message ? err.message : err);
        }
        if (window.console && console.error) console.error(err);
      }
      try {
        var src = document.getElementById("app-source").textContent;
        var result = Babel.transform(src, { presets: ["react"], sourceType: "script" });
        var script = document.createElement("script");
        script.textContent = result.code;
        document.body.appendChild(script);
      } catch (err) {
        showError(err);
      }
    })();
  </script>
</body>
</html>
