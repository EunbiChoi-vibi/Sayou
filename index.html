        <Card style={{ padding: 14, marginBottom: 10 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1.4fr 1fr auto", gap: 6 }}>
            <input list="issueProjectOptions" value={draft.siteName} onChange={(e) => setDraft({ ...draft, siteName: e.target.value })} placeholder="프로젝트명" style={stageInputStyle} />
            <datalist id="issueProjectOptions">
              {ALL_PROJECT_NAMES.map((p) => <option key={p} value={p} />)}
            </datalist>
            <input value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} placeholder="이슈 제목" style={stageInputStyle} />
            <select value={draft.status} onChange={(e) => setDraft({ ...draft, status: e.target.value })} style={stageInputStyle}>
              <option value="접수">접수</option>
              <option value="처리중">처리중</option>
              <option value="완료">완료</option>
            </select>
            <button onClick={addIssue} style={{ fontSize: 12, fontWeight: 700, padding: "8px 12px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 추가</button>
          </div>
          <input value={draft.desc} onChange={(e) => setDraft({ ...draft, desc: e.target.value })} placeholder="설명 (선택)" style={{ ...stageInputStyle, width: "100%", marginTop: 6 }} />
        </Card>
        <div style={{ marginBottom: 8 }}><NotionStatusBadge sync={notionSync} /></div>
        <Card>
          {sortedIssues.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>등록된 이슈가 없습니다.</div>
          ) : sortedIssues.map((item, i) => (
            <div key={item.id} style={{ padding: "14px 16px", borderBottom: i === sortedIssues.length - 1 ? "none" : `1px solid ${DASH.line}` }}>

function AiQuickActions() {
  const [toast, setToast] = useState(null);
  const [copiedIdx, setCopiedIdx] = useState(null);
  const toastTimer = useRef(null);
  const copyTimer = useRef(null);

  function showToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  }
  function copyPrompt(text, idx) {
    const done = () => {
      setCopiedIdx(idx);
      if (copyTimer.current) clearTimeout(copyTimer.current);
      copyTimer.current = setTimeout(() => setCopiedIdx(null), 1400);
      showToast("프롬프트가 복사되었습니다. Claude에 붙여넣어 실행하세요.");
    };
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }
  function fallbackCopy(text, cb) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    cb();
  }

  return (
    <section style={{ marginBottom: 10, position: "relative" }}>
      <SectionHead title="AI 빠른 실행" note="클릭하면 프롬프트가 복사됩니다 · Claude에 붙여넣어 실행하세요" />
      <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 12 }}>
        {aiActions.map((a, i) => (
          <div
            key={i}
            onClick={() => copyPrompt(a.prompt, i)}
            style={{ background: DASH.navy, color: "#EDEFE9", borderRadius: 10, padding: "16px 15px", cursor: "pointer", border: `1px solid ${DASH.navy}`, position: "relative" }}
          >
            <span style={{ position: "absolute", top: 12, right: 12, fontSize: 10, fontWeight: 700, color: DASH.brass, opacity: copiedIdx === i ? 1 : 0, transition: "opacity .2s ease" }}>복사됨 ✓</span>
            <div style={{ width: 30, height: 30, borderRadius: 8, background: "rgba(183,163,130,0.28)", color: DASH.brass, display: "flex", alignItems: "center", justifyContent: "center", marginBottom: 12, fontSize: 15 }}>{a.icon}</div>
            <div style={{ fontSize: 13.5, fontWeight: 700, marginBottom: 5 }}>{a.title}</div>
            <div style={{ fontSize: 11, color: "#AEB6C6", lineHeight: 1.4 }}>{a.desc}</div>
          </div>
        ))}
      </div>
      <div style={{ marginTop: 16, fontSize: 11.5, color: DASH.inkFaint, textAlign: "center" }}>AI는 업무를 보조하며, 최종 결정은 사람이 합니다.</div>

      {toast && (
        <div style={{ position: "fixed", bottom: 26, left: "50%", transform: "translateX(-50%)", background: DASH.navy, color: "#fff", padding: "11px 20px", borderRadius: 100, fontSize: 13, boxShadow: "0 10px 30px -8px rgba(0,0,0,0.4)", zIndex: 999, whiteSpace: "nowrap" }}>
          {toast}
        </div>
      )}
    </section>
  );
}

/* -------------------------------- calculations -------------------------------- */

function roundQty(raw, unit) {
  if (!isFinite(raw) || raw <= 0) return 0;
  if (DISCRETE_UNITS.includes(unit)) return Math.ceil(raw);
  return Math.ceil(raw * 10) / 10;
}

function computeQty(item, totalPyeong, options) {
  if (item.mode === "fixed") return Number(item.fixedQty) || 0;
  let raw = totalPyeong * (Number(item.coef) || 0) * (1 + (Number(item.loss) || 0) / 100);
  if (options) {
    const isGypsum = item.name.includes("석고보드");
    const isBoardLike = isGypsum || item.name.includes("합판");
    if (isBoardLike && options.doubleSided) raw *= 2;
    if (isGypsum && Number(options.gypsumPly) === 2) raw *= 2;
  }
  return roundQty(raw, item.unit);
}

function areaM2(a) {
  return ((Number(a.width) || 0) / 1000) * ((Number(a.depth) || 0) / 1000);
}
function categoryTotalPyeong(catState) {
  const totalM2 = catState.areas.reduce((s, a) => s + areaM2(a), 0);
  return totalM2 / PYEONG_TO_M2;
}

function formatWon(n) {
  if (typeof n === "string" && n.trim() !== "" && isNaN(Number(n))) return n.trim();
  return Math.round(Number(n) || 0).toLocaleString("ko-KR") + "원";
}
function formatQty(n, digits = 1) {
  const v = Number(n) || 0;
  return v % 1 === 0 ? v.toLocaleString("ko-KR") : v.toLocaleString("ko-KR", { maximumFractionDigits: digits });
}

function orderLineAmount(item, qty) {
  return (Number(qty) || 0) * (Number(item.price) || 0);
}
function sanitizeIntQty(raw) {
  const digits = String(raw).replace(/[^0-9]/g, "");
  return digits === "" ? "" : String(Number(digits));
}
function vendorOrderTotal(vendorState) {
  return vendorState.items.reduce((s, it) => s + orderLineAmount(it, vendorState.orders[it.id]), 0);
}
function vendorOrderCount(vendorState) {
  return vendorState.items.filter((it) => (Number(vendorState.orders[it.id]) || 0) > 0).length;
}
function grandOrderTotal(estimateData) {
  return VENDOR_LIST.reduce((s, v) => s + vendorOrderTotal(estimateData.vendors[v]), 0);
}

/* ---------------------------------- excel (vendor prices) ---------------------------------- */

function guessKey(sampleRow, candidates) {
  const keys = Object.keys(sampleRow);
  return keys.find((k) => candidates.some((c) => String(k).replace(/\s/g, "").includes(c)));
}

function parseVendorExcelRows(rows) {
  if (!rows || !rows.length) return null;
  const sample = rows[0];
  const nameKey = guessKey(sample, ["자재명", "품명", "자재", "품목", "이름"]);
  const unitKey = guessKey(sample, ["단위"]);
  const priceKey = guessKey(sample, ["단가", "가격", "금액"]);
  if (!nameKey || !priceKey) return null;
  return rows
    .map((r) => ({
      name: String(r[nameKey] || "").trim(),
      unit: unitKey ? String(r[unitKey] || "").trim() : "",
      price: Number(String(r[priceKey]).replace(/[^0-9.-]/g, "")) || 0,
    }))
    .filter((r) => r.name);
}

function applyVendorPriceRows(prevItems, rows) {
  const items = prevItems.map((it) => ({ ...it }));
  let updated = 0;
  let added = 0;
  rows.forEach((row) => {
    const idx = items.findIndex((it) => it.name.replace(/\s/g, "") === row.name.replace(/\s/g, ""));
    if (idx >= 0) {
      items[idx] = { ...items[idx], price: row.price, unit: row.unit || items[idx].unit };
      updated++;
    } else {
      items.push({ id: makeId(), name: row.name, unit: row.unit || "개", price: row.price });
      added++;
    }
  });
  return { items, updated, added };
}

function downloadVendorTemplate() {
  const rows = [
    ["자재명", "단위", "단가"],
    ["합판 (9mm, 3×6)", "장", 28000],
    ["실크벽지 (폭106×15.6m)", "롤", 55000],
  ];
  const ws = XLSX.utils.aoa_to_sheet(rows);
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "단가표");
  XLSX.writeFile(wb, "단가표_업로드양식.xlsx");
}

function QuantityCategoryPanel({ catKey, meta, catState, onUpdateArea, onAddArea, onRemoveArea, onUpdateItem, onAddItem, onRemoveItem, onResetCategory, onUpdateOptions }) {
  const totalPyeong = categoryTotalPyeong(catState);
  const totalM2 = totalPyeong * PYEONG_TO_M2;
  const options = catState.options || {};
  const Icon = meta.icon;

  // 데코타일: 사이즈(450/600각) 기준 필요 박스 수 계산
  let tileBoxInfo = null;
  if (catKey === "데코타일") {
    const sizeM = options.tileSize === "600" ? 0.6 : 0.45;
    const pieceArea = sizeM * sizeM;
    const piecesPerBox = Number(options.piecesPerBox) || 1;
    const boxCoverage = pieceArea * piecesPerBox;
    const tileItem = catState.items.find((it) => it.name.includes("데코타일")) || catState.items[0];
    const neededM2 = tileItem ? (totalPyeong * (Number(tileItem.coef) || 0) * (1 + (Number(tileItem.loss) || 0) / 100)) : totalM2;
    const boxCount = boxCoverage > 0 ? Math.ceil(neededM2 / boxCoverage) : 0;
    tileBoxInfo = { pieceArea, piecesPerBox, boxCoverage, neededM2, boxCount };
  }

  return (
    <div>
      <div className="flex items-start justify-between flex-wrap gap-3" style={{ marginBottom: 16 }}>
        <div className="flex items-center gap-3">
          <div className="flex items-center justify-center rounded-lg" style={{ width: 40, height: 40, background: COLORS.accentSoft, color: COLORS.accent }}>

        </div>
        <button
          onClick={onResetCategory}

          <RotateCcw size={14} /> 초기화

      </div>

      <div className="blueprint-card rounded-xl" style={{ background: COLORS.surface, border: `1px solid ${COLORS.border}`, padding: 16, marginBottom: 16 }}>

          <button onClick={onAddArea} className="flex items-center gap-1 text-sm" style={{ color: COLORS.accent, background: "transparent" }}>
            <Plus size={14} /> 공간 추가

        </div>
        <div>
          {catState.areas.map((area) => (
            <AreaRow key={area.id} area={area} onChange={onUpdateArea} onRemove={onRemoveArea} removable={catState.areas.length > 1} />

          <span className="mono font-semibold" style={{ color: COLORS.ink }}>
            {formatQty(totalPyeong)}평 · {formatQty(totalM2)}㎡
          </span>
        </div>
      </div>

      {catKey === "목공" && (
        <div className="rounded-xl" style={{ background: COLORS.accentSoft, border: `1px solid ${COLORS.border}`, padding: 16, marginBottom: 16 }}>
          <h3 className="text-sm font-semibold" style={{ color: COLORS.ink, marginBottom: 10 }}>가벽 옵션 (석고보드 · 합판 수량에 반영)</h3>

            <div className="flex items-center gap-3">
              <span className="text-sm" style={{ color: COLORS.inkSoft }}>벽 마감면</span>

  const subtotal = results.reduce((s, r) => s + orderLineAmount(r, vendors[r.vendor].orders[r.id]), 0);

function InteriorToolkit({ onBack }) {
  const [data, setData] = useState(defaultData);
  const [loaded, setLoaded] = useState(false);
  const [mode, setMode] = useState("quantity");
  const [activeCategory, setActiveCategory] = useState(CATEGORY_KEYS[0]);
  const [activeVendor, setActiveVendor] = useState(VENDOR_LIST[0]);
  const [searchTerm, setSearchTerm] = useState("");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);
  const [confirmDialog, setConfirmDialog] = useState(null);

  function askConfirm(message, onConfirm) {
    setConfirmDialog({ message, onConfirm });
  }

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(STORAGE_KEY, true);
        if (!cancelled && res && res.value) {
          const parsed = JSON.parse(res.value);
          if (parsed && parsed.quantity && parsed.estimate && parsed.estimate.vendors) {
            VENDOR_LIST.forEach((v) => {
              const vs = parsed.estimate.vendors[v];
              parsed.estimate.vendors[v] = { items: (vs && vs.items) || defaultVendorItems(v), orders: (vs && vs.orders) || {} };
            });
            // migrate old area data to the current mm-based width/depth schema + ensure options exist
            if (parsed.quantity.categories) {
              CATEGORY_KEYS.forEach((k) => {
                const cs = parsed.quantity.categories[k];
                if (!cs) return;
                cs.areas = (cs.areas || []).map((a) => {
                  if (a.width == null && a.depth == null && a.pyeong != null) {
                    // oldest schema: single pyeong value -> assume a square footprint, in mm
                    const sideM = Math.sqrt((Number(a.pyeong) || 0) * PYEONG_TO_M2);
                    return { id: a.id, label: a.label, width: Math.round(sideM * 1000), depth: Math.round(sideM * 1000) };
                  }
                  if (a.width != null && a.depth != null && Number(a.width) > 0 && Number(a.width) < 100) {
                    // previous schema used meters -> convert to millimeters
                    return { ...a, width: Math.round(Number(a.width) * 1000), depth: Math.round(Number(a.depth) * 1000) };
                  }
                  return { width: 0, depth: 0, ...a };
                });
                if (!cs.options) {
                  cs.options = k === "목공" ? { doubleSided: false, gypsumPly: 1 } : k === "데코타일" ? { tileSize: "450", piecesPerBox: 8 } : {};
                }
              });
            }
            setData(parsed);
          }
        }
      } catch (e) {
        // first run
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => {
      cancelled = true;
    };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(data), true);
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 600);
    return () => clearTimeout(t);
  }, [data, loaded]);

  function showToast(type, msg) {
    setToast({ type, msg, key: Date.now() });
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 3800);
  }

  /* ---- quantity handlers ---- */
  function updateProjectField(field, value) {
    setData((prev) => ({ ...prev, quantity: { ...prev.quantity, [field]: value } }));
  }
  function updateArea(cat, id, field, value) {
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: {
          ...prev.quantity.categories,
          [cat]: {
            ...prev.quantity.categories[cat],
            areas: prev.quantity.categories[cat].areas.map((a) => (a.id === id ? { ...a, [field]: value } : a)),
          },
        },
      },
    }));
  }
  function addArea(cat) {
    setData((prev) => {
      const n = prev.quantity.categories[cat].areas.length + 1;
      return {
        ...prev,
        quantity: {
          ...prev.quantity,
          categories: {
            ...prev.quantity.categories,
            [cat]: {
              ...prev.quantity.categories[cat],
              areas: [...prev.quantity.categories[cat].areas, { id: makeId(), label: `공간 ${n}`, width: 0, depth: 0 }],
            },
          },
        },
      };
    });
  }
  function removeArea(cat, id) {
    setData((prev) => {
      const areas = prev.quantity.categories[cat].areas;
      if (areas.length <= 1) return prev;
      return {
        ...prev,
        quantity: {
          ...prev.quantity,
          categories: { ...prev.quantity.categories, [cat]: { ...prev.quantity.categories[cat], areas: areas.filter((a) => a.id !== id) } },
        },
      };
    });
  }
  function updateItem(cat, id, field, value) {
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: {
          ...prev.quantity.categories,
          [cat]: {
            ...prev.quantity.categories[cat],
            items: prev.quantity.categories[cat].items.map((it) => (it.id === id ? { ...it, [field]: value } : it)),
          },
        },
      },
    }));
  }
  function addItem(cat) {
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: {
          ...prev.quantity.categories,
          [cat]: {
            ...prev.quantity.categories[cat],
            items: [...prev.quantity.categories[cat].items, { id: makeId(), name: "", unit: "개", coef: 0, loss: 0, mode: "area", fixedQty: 0 }],
          },
        },
      },
    }));
  }
  function addItemsBulk(cat, newItems) {
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: {
          ...prev.quantity.categories,
          [cat]: { ...prev.quantity.categories[cat], items: [...prev.quantity.categories[cat].items, ...newItems] },
        },
      },
    }));
  }
  function removeItem(cat, id) {
    const target = data.quantity.categories[cat]?.items.find((it) => it.id === id);
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: { ...prev.quantity.categories, [cat]: { ...prev.quantity.categories[cat], items: prev.quantity.categories[cat].items.filter((it) => it.id !== id) } },
      },
    }));
    if (target && target.notionPageId) materialNotionSync.archivePage(target.notionPageId);
  }
  function updateCategoryOptions(cat, field, value) {
    setData((prev) => ({
      ...prev,
      quantity: {
        ...prev.quantity,
        categories: {
          ...prev.quantity.categories,
          [cat]: { ...prev.quantity.categories[cat], options: { ...prev.quantity.categories[cat].options, [field]: value } },
        },
      },
    }));
  }
  function resetCategory(cat) {
    askConfirm(`'${cat}' 항목을 기본값으로 초기화할까요? 입력한 면적이 모두 사라집니다.`, () => {
      setData((prev) => ({ ...prev, quantity: { ...prev.quantity, categories: { ...prev.quantity.categories, [cat]: defaultQuantityCategoryState(cat) } } }));
      showToast("success", `'${cat}' 항목을 초기화했습니다.`);
    });
  }
  function resetAllQuantity() {
    askConfirm("물량 계산기 전체를 초기화할까요? 입력한 모든 면적 데이터가 사라집니다.", () => {
      setData((prev) => ({ ...prev, quantity: defaultQuantityData() }));
      showToast("success", "물량 계산기를 초기화했습니다.");
    });
  }

  /* ---- estimate handlers ---- */
  function resetVendor(vendor) {
    askConfirm(`'${vendor}' 단가표를 초기화할까요? 발주수량도 함께 비워집니다.`, () => {
      setData((prev) => ({ ...prev, estimate: { ...prev.estimate, vendors: { ...prev.estimate.vendors, [vendor]: { items: defaultVendorItems(vendor), orders: {} } } } }));
      showToast("success", `'${vendor}' 단가표를 초기화했습니다.`);
    });
  }
  function resetAllEstimate() {
    askConfirm("견적 계산기 전체를 초기화할까요? 업로드한 모든 단가 데이터와 발주수량이 사라집니다.", () => {
      setData((prev) => ({ ...prev, estimate: defaultEstimateData() }));
      showToast("success", "견적 계산기를 초기화했습니다.");
    });
  }
  function updateOrderQty(vendor, itemId, value) {
    setData((prev) => ({
      ...prev,
      estimate: {
        ...prev.estimate,
        vendors: {
          ...prev.estimate.vendors,
          [vendor]: { ...prev.estimate.vendors[vendor], orders: { ...prev.estimate.vendors[vendor].orders, [itemId]: value } },
        },
      },
    }));
  }
  function clearVendorOrders(vendor) {
    askConfirm(`'${vendor}'에 입력한 발주수량을 모두 비울까요?`, () => {
      setData((prev) => ({
        ...prev,
        estimate: { ...prev.estimate, vendors: { ...prev.estimate.vendors, [vendor]: { ...prev.estimate.vendors[vendor], orders: {} } } },
      }));
      showToast("success", `'${vendor}' 발주수량을 비웠습니다.`);
    });
  }
  function clearAllOrders() {
    askConfirm("모든 발주처의 발주수량을 비울까요?", () => {
      setData((prev) => {
        const vendors = {};
        VENDOR_LIST.forEach((v) => {
          vendors[v] = { ...prev.estimate.vendors[v], orders: {} };
        });
        return { ...prev, estimate: { ...prev.estimate, vendors } };
      });
      showToast("success", "전체 발주수량을 비웠습니다.");
    });
  }
  function handleVendorExcelUpload(e, vendor) {
    const file = e.target.files && e.target.files[0];
    e.target.value = "";
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const wb = XLSX.read(new Uint8Array(evt.target.result), { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const rows = XLSX.utils.sheet_to_json(ws, { defval: "" });
        const parsed = parseVendorExcelRows(rows);
        if (!parsed || !parsed.length) {
          showToast("error", "단가표 형식을 인식하지 못했습니다. '자재명', '단가' 열이 있는지 확인해주세요.");
          return;
        }
        const result = applyVendorPriceRows(data.estimate.vendors[vendor].items, parsed);
        setData((prev) => ({
          ...prev,
          estimate: { ...prev.estimate, vendors: { ...prev.estimate.vendors, [vendor]: { items: result.items, orders: prev.estimate.vendors[vendor].orders } } },
        }));
        showToast("success", `'${vendor}' 단가표 반영 완료 · 수정 ${result.updated}건 · 추가 ${result.added}건`);
      } catch (err) {
        showToast("error", "파일을 읽는 중 문제가 발생했습니다. xlsx / xls / csv 파일인지 확인해주세요.");
      }
    };
    reader.readAsArrayBuffer(file);
  }

  const activeMeta = CATEGORY_META.find((c) => c.key === activeCategory);

  const materialNotionSync = useNotionAutoSync("interior-dashboard-notion-db-material-v1", "582635b88ad4487c88692cbc697ed07f", async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const projectName = data.quantity.projectName || "제목 없는 프로젝트";
    const justPushedIds = [];
    for (const catKey of CATEGORY_KEYS) {
      const cs = data.quantity.categories[catKey];
      const totalPyeong = categoryTotalPyeong(cs);
      for (const item of cs.items) {
        const qty = computeQty(item, totalPyeong, cs.options);
        const props = {
          "이름": notionTitleProp(item.name || "(이름 없음)"),
          "카테고리": notionSelectProp(catKey),
          "단위": notionTextProp(item.unit),
          "필요수량": notionNumberProp(qty),
          "프로젝트명": notionSelectProp(projectName),
        };
        if (item.notionPageId) {
          await notionUpdatePage(workerUrl, item.notionPageId, props);
          updated++;
        } else {
          const page = await notionCreatePage(workerUrl, databaseId, props);
          updateItem(catKey, item.id, "notionPageId", page.id);
          justPushedIds.push(page.id);
          pushed++;
        }
      }
    }
    const knownIds = new Set(justPushedIds);
    CATEGORY_KEYS.forEach((k) => data.quantity.categories[k].items.forEach((it) => { if (it.notionPageId) knownIds.add(it.notionPageId); }));
    const result = await notionQueryDatabase(workerUrl, databaseId, { page_size: 100 });
    const additions = {};
    (result.results || []).forEach((page) => {
      if (knownIds.has(page.id)) return;
      const props = page.properties;
      const catName = notionPlainText(props["카테고리"]);
      if (!CATEGORY_KEYS.includes(catName)) return;
      const newItem = {
        id: makeId(),
        name: notionPlainText(props["이름"]),
        unit: notionPlainText(props["단위"]) || "개",
        mode: "fixed",
        fixedQty: Number(notionPlainText(props["필요수량"])) || 0,
        coef: 0,
        loss: 0,
        notionPageId: page.id,
      };
      (additions[catName] = additions[catName] || []).push(newItem);
      pulled++;
    });
    Object.keys(additions).forEach((catName) => addItemsBulk(catName, additions[catName]));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: COLORS.bg, fontFamily: "'Pretendard', 'IBM Plex Sans KR', sans-serif", color: COLORS.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap');
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css');
        .mono { font-family: 'IBM Plex Mono', monospace; font-variant-numeric: tabular-nums; }
        button { cursor: pointer; }
        input:focus, select:focus, button:focus, textarea:focus { outline: 2px solid ${COLORS.accent}; outline-offset: 1px; }
        .blueprint-card { position: relative; }
        .blueprint-card::before, .blueprint-card::after { content: '+'; position: absolute; font-size: 12px; color: ${COLORS.borderStrong}; line-height: 1; }
        .blueprint-card::before { top: 4px; left: 6px; }
        .blueprint-card::after { top: 4px; right: 6px; }
        @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        @media print {
          .no-print { display: none !important; }
          body { background: #fff; }
        }
      `}</style>

      <datalist id="unit-options">
        {UNIT_OPTIONS.map((u) => (
          <option key={u} value={u} />
        ))}
      </datalist>

      <div className="no-print" style={{ borderBottom: `1px solid ${COLORS.border}`, background: COLORS.surface }}>
        <div style={{ maxWidth: 1180, margin: "0 auto", padding: "20px 24px 0" }}>
          <button
            onClick={onBack}
            className="flex items-center gap-2 text-sm font-semibold rounded-lg"
            style={{ padding: "8px 14px", border: `1px solid ${COLORS.border}`, background: COLORS.bg, color: COLORS.accent, marginBottom: 14 }}
          >
            <ArrowLeft size={15} /> 대시보드로 돌아가기
          </button>
          <p className="mono" style={{ fontSize: 11, letterSpacing: 2, color: COLORS.amber, fontWeight: 600 }}>INTERIOR TOOLKIT</p>
          <h1 style={{ fontFamily: "'Noto Serif KR', serif", fontWeight: 700, fontSize: 24, color: COLORS.accent, marginTop: 6 }}>자재 물량 · 견적 계산기</h1>
          <p className="text-sm" style={{ color: COLORS.inkSoft, marginTop: 4 }}>
            물량 계산기로 시공 면적 대비 필요 자재를 산출하고, 견적 계산기로 발주처별 단가를 확인하세요.
          </p>

          <div style={{ marginTop: 16 }}>
            <ModeSwitcher mode={mode} setMode={setMode} />
          </div>

          <div style={{ marginTop: 18 }}>
            <RulerDecoration />
          </div>

          {mode === "quantity" ? (
            <>
              <div className="flex items-end justify-between flex-wrap gap-3" style={{ padding: "14px 0 4px" }}>
                <div className="flex items-end gap-3 flex-wrap">
                  <div>
                    <label className="text-xs" style={{ color: COLORS.inkSoft }}>프로젝트명</label>
                    <br />
                    <input
                      type="text"
                      value={data.quantity.projectName}
                      onChange={(e) => updateProjectField("projectName", e.target.value)}

                    <input
                      type="date"

                      style={{ padding: "7px 10px", border: `1px solid ${COLORS.border}`, marginTop: 2 }}

                </div>
                <div className="flex items-center gap-2 flex-wrap" style={{ paddingBottom: 2 }}>
                  <span className="text-xs" style={{ color: saveStatus === "error" ? COLORS.danger : COLORS.inkMuted, minWidth: 76 }}>
                    {saveStatus === "saving" ? "저장 중…" : saveStatus === "saved" ? "✓ 자동 저장됨" : saveStatus === "error" ? "저장 실패" : ""}

              <div className="flex items-center gap-2 flex-wrap" style={{ padding: "12px 0 16px" }}>
                {CATEGORY_META.map((c) => (

          ) : (
            <>
              <div style={{ padding: "16px 0 4px" }}>
                <div className="flex items-center gap-2" style={{ maxWidth: 420 }}>
                  <Search size={16} style={{ color: COLORS.inkMuted }} />
                  <input
                    type="text"
                    value={searchTerm}
                    onChange={(e) => setSearchTerm(e.target.value)}

                    <button onClick={() => setSearchTerm("")} style={{ color: COLORS.inkMuted, background: "transparent" }} className="rounded">
                      <X size={16} />

                  )}
                </div>
              </div>

              {!searchTerm && (
                <div className="flex items-end justify-between flex-wrap gap-3" style={{ padding: "14px 0 4px" }}>
                  <div className="flex items-center gap-2 flex-wrap">
                    {VENDOR_LIST.map((v) => (
                      <TabButton key={v} active={activeVendor === v} onClick={() => setActiveVendor(v)} icon={Store} label={v} sub={`${data.estimate.vendors[v].items.length}건`} />
                    ))}
                    <div style={{ width: 1, height: 24, background: COLORS.border, margin: "0 4px" }} />
                    <TabButton
                      active={activeVendor === "발주서"}
                      onClick={() => setActiveVendor("발주서")}
                      icon={Package}
                      label="발주서"
                      sub={formatWon(grandOrderTotal(data.estimate))}
                    />
                  </div>
                  <div className="flex items-center gap-2 flex-wrap" style={{ paddingBottom: 2 }}>
                    <span className="text-xs" style={{ color: saveStatus === "error" ? COLORS.danger : COLORS.inkMuted, minWidth: 76 }}>
                      {saveStatus === "saving" ? "저장 중…" : saveStatus === "saved" ? "✓ 자동 저장됨" : saveStatus === "error" ? "저장 실패" : ""}
                    </span>
                    <button onClick={downloadVendorTemplate} className="flex items-center gap-1 rounded-lg text-sm" style={{ padding: "7px 12px", border: `1px solid ${COLORS.border}`, color: COLORS.inkSoft, background: COLORS.surface }}>
                      <Download size={14} /> 단가표 양식
                    </button>
                    <button onClick={resetAllEstimate} className="flex items-center gap-1 rounded-lg text-sm" style={{ padding: "7px 12px", border: `1px solid ${COLORS.border}`, color: COLORS.danger, background: COLORS.surface }}>
                      <RotateCcw size={14} /> 전체 초기화
                    </button>
                  </div>
                </div>
              )}
              <div style={{ paddingBottom: 16 }} />
            </>
          )}
        </div>
      </div>

      <div style={{ maxWidth: 1180, margin: "0 auto", padding: "24px" }}>
        {mode === "quantity" ? (
          activeCategory === "요약" ? (
            <>
              <div style={{ marginBottom: 10 }}><NotionStatusBadge sync={materialNotionSync} /></div>
              <QuantitySummaryPanel data={data.quantity} />
            </>
          ) : (
            <QuantityCategoryPanel
              catKey={activeCategory}
              meta={activeMeta}
              catState={data.quantity.categories[activeCategory]}
              onUpdateArea={(id, field, value) => updateArea(activeCategory, id, field, value)}
              onAddArea={() => addArea(activeCategory)}
              onRemoveArea={(id) => removeArea(activeCategory, id)}
              onUpdateItem={(id, field, value) => updateItem(activeCategory, id, field, value)}
              onAddItem={() => addItem(activeCategory)}
              onRemoveItem={(id) => removeItem(activeCategory, id)}
              onResetCategory={() => resetCategory(activeCategory)}
              onUpdateOptions={(field, value) => updateCategoryOptions(activeCategory, field, value)}
            />
          )
        ) : searchTerm ? (
          <SearchResultsPanel term={searchTerm} vendors={data.estimate.vendors} onQtyChange={updateOrderQty} />
        ) : activeVendor === "발주서" ? (
          <OrderSummaryPanel estimateData={data.estimate} onClearAll={clearAllOrders} />
        ) : (
          <VendorPanel
            vendor={activeVendor}
            vendorState={data.estimate.vendors[activeVendor]}
            onReset={() => resetVendor(activeVendor)}
            onExcelUpload={handleVendorExcelUpload}
            onQtyChange={(itemId, value) => updateOrderQty(activeVendor, itemId, value)}
            onClearOrders={() => clearVendorOrders(activeVendor)}
          />
        )}
      </div>

      {confirmDialog && (
        <div
          className="no-print"
          style={{ position: "fixed", inset: 0, background: "rgba(22,35,46,0.45)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 100, padding: 20 }}
          onClick={() => setConfirmDialog(null)}
        >
          <div
            onClick={(e) => e.stopPropagation()}
            style={{ background: COLORS.surface, borderRadius: 14, padding: 22, maxWidth: 360, width: "100%", boxShadow: "0 16px 44px rgba(0,0,0,0.22)" }}
          >
            <div className="flex items-center gap-2" style={{ marginBottom: 12, color: COLORS.danger }}>
              <AlertTriangle size={18} />
              <span className="font-semibold" style={{ fontSize: 15, color: COLORS.ink }}>확인이 필요합니다</span>
            </div>
            <p className="text-sm" style={{ color: COLORS.inkSoft, lineHeight: 1.6, marginBottom: 20 }}>{confirmDialog.message}</p>
            <div className="flex items-center justify-end gap-2">
              <button
                onClick={() => setConfirmDialog(null)}
                className="rounded-lg text-sm"
                style={{ padding: "8px 16px", border: `1px solid ${COLORS.border}`, color: COLORS.inkSoft, background: COLORS.surface }}
              >
                취소
              </button>
              <button
                onClick={() => {
                  confirmDialog.onConfirm();
                  setConfirmDialog(null);
                }}
                className="rounded-lg text-sm font-semibold"
                style={{ padding: "8px 16px", border: "none", color: "#fff", background: COLORS.danger }}
              >
                확인
              </button>
            </div>
          </div>
        </div>
      )}

      {toast && (
        <div
          className="no-print"
          style={{
            position: "fixed",
            bottom: 20,
            right: 20,
            background: toast.type === "error" ? COLORS.dangerSoft : COLORS.successSoft,
            border: `1px solid ${toast.type === "error" ? COLORS.danger : COLORS.success}`,
            color: toast.type === "error" ? COLORS.danger : COLORS.success,
            padding: "10px 16px",
            borderRadius: 10,
            fontSize: 13,
            display: "flex",
            alignItems: "center",
            gap: 8,
            animation: "toastIn 0.2s ease",
            maxWidth: 360,
            boxShadow: "0 4px 14px rgba(0,0,0,0.08)",
            zIndex: 50,
          }}
        >
          {toast.type === "error" ? <AlertTriangle size={15} /> : <Check size={15} />}
          <span>{toast.msg}</span>
        </div>
      )}
    </div>
  );
}

/* ============================================================================
   공정별 거래처 (VENDOR DIRECTORY) — 카테고리(탭) 추가/수정 + 결제양식 복사
   ============================================================================ */

const VENDOR_DIR_STORAGE_KEY = "interior-dashboard-vendor-directory-v4";

function makeVendorRowId() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function makeCategoryId() { return "cat_" + Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }

const VENDOR_SEED_CATEGORIES = [
  { id: "cat_demolition", name: "철거" },
  { id: "cat_electric", name: "전기" },
  { id: "cat_carpentry", name: "목공" },
  { id: "cat_film", name: "필름" },
  { id: "cat_paint", name: "도장" },
  { id: "cat_furniture", name: "가구" },
  { id: "cat_metal", name: "금속" },
  { id: "cat_waste", name: "폐기물" },
  { id: "cat_silicone", name: "실리콘" },
];
const VENDOR_SEED_CONTACTS = {
  cat_demolition: [{ company: "", manager: "김기선 반장님", phone: "010-7338-2335", email: "", account: "", note: "" }],
  cat_electric: [{ company: "휴지전기", manager: "", phone: "010-7934-4795", email: "", account: "", note: "" }],
  cat_carpentry: [{ company: "", manager: "김봉출 반장님", phone: "070-8836-0404", email: "", account: "", note: "" }],
  cat_film: [{ company: "반듯필름", manager: "위은진 대표", phone: "010-8760-5889", email: "", account: "", note: "" }],
  cat_paint: [{ company: "", manager: "김태선 반장님", phone: "010-2441-4076", email: "", account: "", note: "" }],
  cat_furniture: [{ company: "두드림", manager: "조독연 실장님", phone: "010-2850-2369", email: "", account: "", note: "" }],
  cat_metal: [],
  cat_waste: [{ company: "", manager: "", phone: "010-5251-0018", email: "", account: "", note: "" }],
  cat_silicone: [],
};

function defaultVendorState() {
  const contacts = {};
  VENDOR_SEED_CATEGORIES.forEach((c) => {
    contacts[c.id] = (VENDOR_SEED_CONTACTS[c.id] || []).map((it) => ({ id: makeVendorRowId(), ...it }));
  });
  return { categories: VENDOR_SEED_CATEGORIES.map((c) => ({ ...c })), contacts };
}
function emptyDraft() { return { company: "", manager: "", phone: "", email: "", account: "", note: "" }; }
const vendorInputStyle = { width: "100%", fontFamily: "'Pretendard'", fontSize: 12.5, padding: "7px 9px", borderRadius: 6, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.ink, outline: "none" };

function buildSettleText(site, amount, account, holder) {
  const num = String(amount || "").replace(/[^0-9.-]/g, "");
  const amountLabel = num ? Number(num).toLocaleString("ko-KR") : "";
  return `[${site}]\n금액 : ${amountLabel}원\n계좌 : ${account}\n예금주 : ${holder}\n세금계산서 발행 완료`;
}

function VendorContacts({ onBack }) {
  const [vendorState, setVendorState] = useState(defaultVendorState);
  const [loaded, setLoaded] = useState(false);
  const [activeCatId, setActiveCatId] = useState(VENDOR_SEED_CATEGORIES[0].id);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [newDraft, setNewDraft] = useState(emptyDraft);
  const [editingId, setEditingId] = useState(null);
  const [editDraft, setEditDraft] = useState(emptyDraft);
  const [tabEditMode, setTabEditMode] = useState(false);
  const [newCategoryInput, setNewCategoryInput] = useState("");
  const [settleTargetId, setSettleTargetId] = useState(null);
  const [settleForm, setSettleForm] = useState({ siteName: "", amount: "" });
  const [toast, setToast] = useState(null);
  const toastTimer = useRef(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(VENDOR_DIR_STORAGE_KEY, true);
        if (!cancelled && res && res.value) {
          const parsed = JSON.parse(res.value);
          if (parsed && Array.isArray(parsed.categories) && parsed.contacts) {
            setVendorState(parsed);
            if (parsed.categories.length > 0) setActiveCatId(parsed.categories[0].id);
          }
        }
      } catch (e) {
        // first run — keep seed defaults
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(VENDOR_DIR_STORAGE_KEY, JSON.stringify(vendorState), true);
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 600);
    return () => clearTimeout(t);
  }, [vendorState, loaded]);

  function showToast(msg) {
    setToast(msg);
    if (toastTimer.current) clearTimeout(toastTimer.current);
    toastTimer.current = setTimeout(() => setToast(null), 2600);
  }
  function fallbackCopy(text, cb) {
    const ta = document.createElement("textarea");
    ta.value = text; ta.style.position = "fixed"; ta.style.opacity = "0";
    document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    cb();
  }

  const { categories, contacts } = vendorState;
  const activeCat = categories.find((c) => c.id === activeCatId) || categories[0];
  const list = (activeCat && contacts[activeCat.id]) || [];

  function switchCategory(id) {
    setActiveCatId(id);
    setNewDraft(emptyDraft());
    setEditingId(null);
    setEditDraft(emptyDraft());
    setSettleTargetId(null);
  }

  function addCategory() {
    const name = newCategoryInput.trim();
    if (!name) return;
    const id = makeCategoryId();
    setVendorState((prev) => ({
      categories: [...prev.categories, { id, name }],
      contacts: { ...prev.contacts, [id]: [] },
    }));
    setNewCategoryInput("");
    setActiveCatId(id);
  }
  function renameCategory(id, name) {
    setVendorState((prev) => ({ ...prev, categories: prev.categories.map((c) => (c.id === id ? { ...c, name } : c)) }));
  }
  function deleteCategory(id) {
    setVendorState((prev) => {
      if (prev.categories.length <= 1) return prev;
      const nextCategories = prev.categories.filter((c) => c.id !== id);
      const nextContacts = { ...prev.contacts };
      delete nextContacts[id];
      if (activeCatId === id) setActiveCatId(nextCategories[0].id);
      return { categories: nextCategories, contacts: nextContacts };
    });
  }

  function commitAdd() {
    if (!activeCat) return;
    if (!newDraft.company.trim() && !newDraft.manager.trim() && !newDraft.phone.trim()) return;
    setVendorState((prev) => ({
      ...prev,
      contacts: { ...prev.contacts, [activeCat.id]: [...(prev.contacts[activeCat.id] || []), { id: makeVendorRowId(), ...newDraft }] },
    }));
    setNewDraft(emptyDraft());
  }
  function startEdit(c) {
    setEditingId(c.id);
    setEditDraft({ company: c.company, manager: c.manager, phone: c.phone, email: c.email, account: c.account || "", note: c.note });
    setSettleTargetId(null);
  }
  function cancelEdit() {
    setEditingId(null);
    setEditDraft(emptyDraft());
  }
  function commitEdit(catId, id) {
    setVendorState((prev) => ({
      ...prev,
      contacts: { ...prev.contacts, [catId]: prev.contacts[catId].map((c) => (c.id === id ? { ...c, ...editDraft } : c)) },
    }));
    setEditingId(null);
    setEditDraft(emptyDraft());
  }
  function removeContact(catId, id) {
    const target = (contacts[catId] || []).find((c) => c.id === id);
    setVendorState((prev) => ({ ...prev, contacts: { ...prev.contacts, [catId]: prev.contacts[catId].filter((c) => c.id !== id) } }));
    if (editingId === id) cancelEdit();
    if (settleTargetId === id) setSettleTargetId(null);

  }
  function copySettle(c) {
    const holder = c.manager || c.company || "";
    const text = buildSettleText(settleForm.siteName || "", settleForm.amount, c.account || "", holder);
    const done = () => showToast("결제 양식이 복사되었습니다.");
    if (navigator.clipboard && window.isSecureContext) {
      navigator.clipboard.writeText(text).then(done).catch(() => fallbackCopy(text, done));
    } else {
      fallbackCopy(text, done);
    }
  }
  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-vendor-v1", "28afc9d8c57b4b5c86d24f22e363781b", async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const cat of categories) {
      const list = contacts[cat.id] || [];
      for (const c of list) {
        const props = {
          "이름": notionTitleProp(c.company || c.manager || "(이름없음)"),
          "공정": notionSelectProp(cat.name),
          "담당자": notionTextProp(c.manager),
          "연락처": notionTextProp(c.phone),
          "이메일": notionEmailProp(c.email),
          "계좌": notionTextProp(c.account),
          "비고": notionTextProp(c.note),
        };
        if (c.notionPageId) {
          await notionUpdatePage(workerUrl, c.notionPageId, props);
          updated++;
        } else {
          const page = await notionCreatePage(workerUrl, databaseId, props);
          pushed++;
          justPushedIds.push(page.id);
          setVendorState((prev) => ({
            ...prev,
            contacts: { ...prev.contacts, [cat.id]: prev.contacts[cat.id].map((x) => (x.id === c.id ? { ...x, notionPageId: page.id } : x)) },
          }));
        }
      }
    }
    const knownIds = new Set(justPushedIds);
    Object.values(contacts).forEach((list) => list.forEach((c) => { if (c.notionPageId) knownIds.add(c.notionPageId); }));
    const result = await notionQueryDatabase(workerUrl, databaseId, { page_size: 100 });
    const byCategoryName = {};
    categories.forEach((c) => { byCategoryName[c.name] = c.id; });
    const newCategories = [...categories];
    const additions = {};
    (result.results || []).forEach((page) => {
      if (knownIds.has(page.id)) return;
      const props = page.properties;
      const catName = notionPlainText(props["공정"]) || "기타";
      let catId = byCategoryName[catName];
      if (!catId) {
        catId = makeCategoryId();
        byCategoryName[catName] = catId;
        newCategories.push({ id: catId, name: catName });
      }
      (additions[catId] = additions[catId] || []).push({
        id: makeVendorRowId(),
        company: notionPlainText(props["이름"]),
        manager: notionPlainText(props["담당자"]),
        phone: notionPlainText(props["연락처"]),
        email: notionPlainText(props["이메일"]),
        account: notionPlainText(props["계좌"]),
        note: notionPlainText(props["비고"]),
        notionPageId: page.id,
      });
      pulled++;
    });
    if (pulled > 0) {
      setVendorState((prev) => {
        const nextContacts = { ...prev.contacts };
        Object.keys(additions).forEach((catId) => {
          nextContacts[catId] = [...(nextContacts[catId] || []), ...additions[catId]];
        });
        return { categories: newCategories, contacts: nextContacts };
      });
    }
    return { pushed, pulled, updated };
  });

function makeStageId() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
const STAGE_TODAY = "2026-07-03";

function useProjectStore(storageKey, makeDefault) {
  const [store, setStore] = useState(() => (typeof makeDefault === "function" ? makeDefault() : (makeDefault || {})));
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(storageKey, true);
        if (!cancelled && res && res.value) {
          const parsed = JSON.parse(res.value);
          if (parsed && typeof parsed === "object") setStore(parsed);
        }
      } catch (e) {
        // first run
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(storageKey, JSON.stringify(store), true);
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 600);
    return () => clearTimeout(t);
  }, [store, loaded]);

  return [store, setStore, loaded, saveStatus];
}

  return (

  );
}

function fileToCompressedDataUrl(file, maxWidth) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error("파일을 읽지 못했습니다."));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error("이미지를 처리하지 못했습니다."));
      img.onload = () => {
        const scale = Math.min(1, (maxWidth || 640) / img.width);
        const canvas = document.createElement("canvas");
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        const ctx = canvas.getContext("2d");
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        resolve(canvas.toDataURL("image/jpeg", 0.6));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

function defaultPaymentsStore() { return { payments: [] }; }

function PaymentsPage({ onBack }) {
  const [store, setStore, loaded, saveStatus] = useProjectStore(PAYMENTS_STORAGE_KEY, defaultPaymentsStore);
  const [tab, setTab] = useState("pending"); // 'pending' | 'done'
  const [draft, setDraft] = useState({ projectName: "", content: "", dueDate: STAGE_TODAY, amount: "" });

  function addPayment() {
    if (!draft.projectName.trim() || !draft.content.trim()) return;
    setStore((prev) => ({
      payments: [...prev.payments, { id: makeStageId(), projectName: draft.projectName.trim(), content: draft.content.trim(), dueDate: draft.dueDate, amount: Number(draft.amount) || 0, done: false }],
    }));
    setDraft({ projectName: "", content: "", dueDate: STAGE_TODAY, amount: "" });
  }
  function toggleDone(id) {
    setStore((prev) => ({ payments: prev.payments.map((p) => (p.id === id ? { ...p, done: !p.done } : p)) }));
  }
  function removePayment(id) {
    const target = payments.find((p) => p.id === id);
    setStore((prev) => ({ payments: prev.payments.filter((p) => p.id !== id) }));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }

  const payments = loaded ? store.payments : [];
  const pending = payments.filter((p) => !p.done).sort((a, b) => (a.dueDate < b.dueDate ? -1 : 1));
  const done = payments.filter((p) => p.done).sort((a, b) => (a.dueDate < b.dueDate ? 1 : -1));
  const shown = tab === "pending" ? pending : done;
  const pendingTotal = pending.reduce((s, p) => s + (Number(p.amount) || 0), 0);

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-payments-v1", NOTION_DB_PAYMENTS, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const p of payments) {
      const props = {
        "이름": notionTitleProp(p.content),
        "프로젝트명": notionSelectProp(p.projectName),
        "결제내용": notionTextProp(p.content),
        "결제기한": notionDateRangeProp(p.dueDate, p.dueDate),
        "결제금액": notionNumberProp(p.amount),
        "완료": { checkbox: !!p.done },
      };
      if (p.notionPageId) {
        await notionUpdatePage(workerUrl, p.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        setStore((prev) => ({ payments: prev.payments.map((x) => (x.id === p.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...payments.map((p) => p.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { page_size: 100 });
    const newPayments = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["결제기한"]);
      newPayments.push({
        id: makeStageId(),
        projectName: notionPlainText(props["프로젝트명"]),
        content: notionPlainText(props["결제내용"]) || notionPlainText(props["이름"]) || "(내용 없음)",
        dueDate: range ? range.start.slice(0, 10) : STAGE_TODAY,
        amount: Number(notionPlainText(props["결제금액"])) || 0,
        done: props["완료"]?.checkbox || false,
        notionPageId: page.id,
      });
      pulled++;
    });
    if (newPayments.length) setStore((prev) => ({ payments: [...prev.payments, ...newPayments] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="Payments" title="결제 확인 필요 목록" desc="프로젝트별 결제 내용·기한·금액을 관리하고, 완료 여부로 구분해서 보세요." />
          <SaveStatusText status={saveStatus} />
        </div>

        <div style={{ marginBottom: 14 }}><NotionStatusBadge sync={notionSync} /></div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>결제 항목 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1.6fr 1fr 1fr auto", gap: 8 }}>
            <input list="paymentProjectOptions" value={draft.projectName} onChange={(e) => setDraft({ ...draft, projectName: e.target.value })} placeholder="프로젝트명" style={stageInputStyle} />
            <datalist id="paymentProjectOptions">
              {ALL_PROJECT_NAMES.map((p) => <option key={p} value={p} />)}
            </datalist>
            <input value={draft.content} onChange={(e) => setDraft({ ...draft, content: e.target.value })} placeholder="결제 내용 (예: 목공 자재비)" style={stageInputStyle} />
            <input type="date" value={draft.dueDate} onChange={(e) => setDraft({ ...draft, dueDate: e.target.value })} style={stageInputStyle} />
            <input type="number" value={draft.amount} onChange={(e) => setDraft({ ...draft, amount: e.target.value })} placeholder="금액 (원)" style={stageInputStyle} />
            <button onClick={addPayment} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 추가</button>
          </div>
        </Card>

        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          <button onClick={() => setTab("pending")} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 100, border: `1px solid ${tab === "pending" ? DASH.navy : DASH.line}`, background: tab === "pending" ? DASH.navy : DASH.surface, color: tab === "pending" ? "#fff" : DASH.inkSoft }}>
            미완료 ({pending.length})
          </button>
          <button onClick={() => setTab("done")} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 100, border: `1px solid ${tab === "done" ? DASH.navy : DASH.line}`, background: tab === "done" ? DASH.navy : DASH.surface, color: tab === "done" ? "#fff" : DASH.inkSoft }}>
            완료 ({done.length})
          </button>
          {tab === "pending" && <span style={{ marginLeft: "auto", fontSize: 12, color: DASH.inkFaint, alignSelf: "center" }}>미결제 합계 {pendingTotal.toLocaleString("ko-KR")}원</span>}
        </div>

        <Card>
          {shown.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{tab === "pending" ? "미완료 결제 항목이 없습니다." : "완료된 결제 항목이 없습니다."}</div>
          ) : shown.map((p, i) => (
            <div key={p.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", borderBottom: i === shown.length - 1 ? "none" : `1px solid ${DASH.line}`, opacity: p.done ? 0.55 : 1 }}>
              <span onClick={() => toggleDone(p.id)} style={{ width: 16, height: 16, borderRadius: 5, border: "1.6px solid #B9C0BC", cursor: "pointer", background: p.done ? DASH.teal : "transparent", flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 700, color: DASH.ink }}>{p.projectName}</div>
                <div style={{ fontSize: 12, color: DASH.inkSoft }}>{p.content}</div>
              </div>
              <div style={{ textAlign: "right", flexShrink: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 700, color: DASH.brass, fontFamily: "'Noto Serif KR', serif" }}>{(Number(p.amount) || 0).toLocaleString("ko-KR")}원</div>
                <div style={{ fontSize: 10.5, color: DASH.inkFaint }}>{fmtYMDLabel(p.dueDate)} 기한</div>
              </div>
              <StageDeleteBtn onClick={() => removePayment(p.id)} />
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

  }, [projectName, loaded]);

  const current = store[projectName] || defaultMeasureProject();
  function update(updater) { setStore((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultMeasureProject()) })); }

  function toggleChecklist(id) { update((proj) => ({ ...proj, checklist: proj.checklist.map((c) => (c.id === id ? { ...c, done: !c.done } : c)) })); }
  function removeChecklist(id) { update((proj) => ({ ...proj, checklist: proj.checklist.filter((c) => c.id !== id) })); }
  function addChecklist() {
    if (!newChecklistItem.trim()) return;
    update((proj) => ({ ...proj, checklist: [...proj.checklist, { id: makeStageId(), label: newChecklistItem.trim(), done: false }] }));
    setNewChecklistItem("");
  }

  async function handleImagePick(e) {
    const files = Array.from(e.target.files || []).slice(0, 4);
    const compressed = await Promise.all(files.map((f) => fileToCompressedDataUrl(f, 480)));
    setPendingImages((prev) => [...prev, ...compressed].slice(0, 4));
    e.target.value = "";
  }
  function addEntry() {
    if (!draft.content.trim() && pendingImages.length === 0) return;
    update((proj) => ({ ...proj, entries: [...proj.entries, { id: makeStageId(), date: draft.date, content: draft.content.trim(), images: pendingImages }] }));
    setDraft({ date: STAGE_TODAY, content: "" });
    setPendingImages([]);
  }
  function removeEntry(id) {
    const target = current.entries.find((e) => e.id === id);
    update((proj) => ({ ...proj, entries: proj.entries.filter((e) => e.id !== id) }));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }

  const doneCount = current.checklist.filter((c) => c.done).length;

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-measure-v1", NOTION_DB_MEASURE, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const e of current.entries) {
      const props = {
        "이름": notionTitleProp(`${projectName} 실측 (${e.date})`),
        "프로젝트명": notionSelectProp(projectName),
        "실측일": notionDateRangeProp(e.date, e.date),
        "내용": notionTextProp(e.content),
        "이미지메모": notionTextProp(e.images && e.images.length ? `사진 ${e.images.length}장 첨부됨 (대시보드에서 확인)` : ""),
      };
      if (e.notionPageId) {
        await notionUpdatePage(workerUrl, e.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        update((proj) => ({ ...proj, entries: proj.entries.map((x) => (x.id === e.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.entries.map((e) => e.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const newEntries = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["실측일"]);
      newEntries.push({ id: makeStageId(), date: range ? range.start.slice(0, 10) : STAGE_TODAY, content: notionPlainText(props["내용"]), images: [], notionPageId: page.id });
      pulled++;
    });
    if (newEntries.length) update((proj) => ({ ...proj, entries: [...proj.entries, ...newEntries] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="Measurement" title="실측" desc="실측 체크리스트를 확인하고, 프로젝트별 실측 이미지와 내용을 기록하세요." />
          <SaveStatusText status={saveStatus} />
        </div>

        <ProjectPicker projectName={projectName} setProjectName={setProjectName} extraNames={Object.keys(store)} />

        <div style={{ marginBottom: 14 }}><NotionStatusBadge sync={notionSync} /></div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10 }}>
            <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy }}>실측 체크리스트</div>
            <span style={{ fontSize: 11.5, color: DASH.inkFaint }}>{doneCount}/{current.checklist.length} 완료</span>
          </div>
          {current.checklist.map((c) => (
            <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 0" }}>
              <span onClick={() => toggleChecklist(c.id)} style={{ width: 16, height: 16, borderRadius: 5, border: "1.6px solid #B9C0BC", cursor: "pointer", background: c.done ? DASH.teal : "transparent", flexShrink: 0 }} />
              <span style={{ flex: 1, fontSize: 13, color: DASH.ink, textDecoration: c.done ? "line-through" : "none" }}>{c.label}</span>
              <StageDeleteBtn onClick={() => removeChecklist(c.id)} />
            </div>
          ))}
          <div style={{ display: "flex", gap: 6, marginTop: 10 }}>
            <input value={newChecklistItem} onChange={(e) => setNewChecklistItem(e.target.value)} placeholder="체크 항목 추가" style={{ ...stageInputStyle, flex: 1 }} />
            <button onClick={addChecklist} style={{ fontSize: 12.5, fontWeight: 600, padding: "8px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.navy }}>+ 추가</button>
          </div>
        </Card>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>실측 기록 추가</div>
          <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
            <input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={stageInputStyle} />
            <label className="flex items-center gap-2" style={{ ...stageInputStyle, cursor: "pointer", background: DASH.brassSoft }}>
              📷 사진 첨부 ({pendingImages.length}/4)
              <input type="file" accept="image/*" multiple onChange={handleImagePick} style={{ display: "none" }} />
            </label>
          </div>
          {pendingImages.length > 0 && (
            <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
              {pendingImages.map((src, i) => <img key={i} src={src} style={{ width: 56, height: 56, objectFit: "cover", borderRadius: 6, border: `1px solid ${DASH.line}` }} />)}
            </div>
          )}
          <textarea value={draft.content} onChange={(e) => setDraft({ ...draft, content: e.target.value })} placeholder="실측 내용 메모" style={stageTextareaStyle} />
          <button onClick={addEntry} style={{ marginTop: 8, fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 기록 추가</button>
        </Card>

        <Card>
          {current.entries.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{projectName}의 실측 기록이 없습니다.</div>
          ) : [...current.entries].sort((a, b) => (a.date < b.date ? 1 : -1)).map((e, i, arr) => (
            <div key={e.id} style={{ padding: "14px 16px", borderBottom: i === arr.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                <div style={{ fontSize: 12, fontWeight: 700, color: DASH.brass, marginBottom: 6 }}>{fmtYMDLabel(e.date)}</div>
                <StageDeleteBtn onClick={() => removeEntry(e.id)} />
              </div>
              {e.images && e.images.length > 0 && (
                <div style={{ display: "flex", gap: 6, marginBottom: 8 }}>
                  {e.images.map((src, idx) => <img key={idx} src={src} style={{ width: 72, height: 72, objectFit: "cover", borderRadius: 6, border: `1px solid ${DASH.line}` }} />)}
                </div>
              )}
              <div style={{ fontSize: 13, color: DASH.ink, lineHeight: 1.5 }}>{e.content}</div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}

/* ============================================================================
   제안서 — 프로젝트별 제안서 파일/내용 업로드
   ============================================================================ */

function defaultProposalProject() { return { entries: [] }; }

function ProposalPage({ onBack }) {
  const [store, setStore, loaded, saveStatus] = useProjectStore(PROPOSAL_STORAGE_KEY, {});
  const [projectName, setProjectName] = useState(ALL_PROJECT_NAMES[0] || "새 프로젝트");
  const [draft, setDraft] = useState({ title: "", date: STAGE_TODAY, content: "", link: "" });
  const [pendingFile, setPendingFile] = useState(null);
  const [fileWarning, setFileWarning] = useState("");

  useEffect(() => {
    if (loaded && projectName && !store[projectName]) {
      setStore((prev) => ({ ...prev, [projectName]: defaultProposalProject() }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectName, loaded]);

  const current = store[projectName] || defaultProposalProject();
  function update(updater) { setStore((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultProposalProject()) })); }

  function handleFilePick(e) {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 1_500_000) {
      setFileWarning("파일이 1.5MB보다 커서 첨부 대신 '링크' 칸에 구글 드라이브 등의 공유 링크를 넣어주세요.");
      e.target.value = "";
      return;
    }
    setFileWarning("");
    const reader = new FileReader();
    reader.onload = () => setPendingFile({ name: file.name, dataUrl: reader.result });
    reader.readAsDataURL(file);
    e.target.value = "";
  }

  function addEntry() {
    if (!draft.title.trim()) return;
    update((proj) => ({ entries: [...proj.entries, { id: makeStageId(), title: draft.title.trim(), date: draft.date, content: draft.content.trim(), link: draft.link.trim(), fileName: pendingFile?.name, fileDataUrl: pendingFile?.dataUrl }] }));
    setDraft({ title: "", date: STAGE_TODAY, content: "", link: "" });
    setPendingFile(null);
  }
  function removeEntry(id) {
    const target = current.entries.find((e) => e.id === id);
    update((proj) => ({ entries: proj.entries.filter((e) => e.id !== id) }));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-proposal-v1", NOTION_DB_PROPOSAL, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const e of current.entries) {
      const props = {
        "이름": notionTitleProp(e.title),
        "프로젝트명": notionSelectProp(projectName),
        "날짜": notionDateRangeProp(e.date, e.date),
        "내용": notionTextProp(e.content),
        "링크": { url: e.link || null },
      };
      if (e.notionPageId) {
        await notionUpdatePage(workerUrl, e.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        update((proj) => ({ entries: proj.entries.map((x) => (x.id === e.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.entries.map((e) => e.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { filter: { property: "프로젝트명", select: { equals: projectName } }, page_size: 100 });
    const newEntries = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const range = notionDateValue(props["날짜"]);
      newEntries.push({ id: makeStageId(), title: notionPlainText(props["이름"]) || "(제목 없음)", date: range ? range.start.slice(0, 10) : STAGE_TODAY, content: notionPlainText(props["내용"]), link: props["링크"]?.url || "", notionPageId: page.id });
      pulled++;
    });
    if (newEntries.length) update((proj) => ({ entries: [...proj.entries, ...newEntries] }));
    return { pushed, pulled, updated };
  });

  return (
    <div style={{ minHeight: "100vh", background: DASH.paper, color: DASH.ink, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ maxWidth: 900, margin: "0 auto", padding: "28px 24px 60px" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
          <StageHeader onBack={onBack} eyebrow="Proposal" title="제안서" desc="프로젝트별 제안서 파일이나 내용을 업로드하고 관리하세요." />
          <SaveStatusText status={saveStatus} />
        </div>

        <ProjectPicker projectName={projectName} setProjectName={setProjectName} extraNames={Object.keys(store)} />

        <div style={{ marginBottom: 14 }}><NotionStatusBadge sync={notionSync} /></div>

        <Card style={{ padding: 16, marginBottom: 14 }}>
          <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>제안서 추가</div>
          <div style={{ display: "grid", gridTemplateColumns: "1.5fr 1fr", gap: 8, marginBottom: 8 }}>
            <input value={draft.title} onChange={(e) => setDraft({ ...draft, title: e.target.value })} placeholder="제안서 제목" style={stageInputStyle} />
            <input type="date" value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} style={stageInputStyle} />
          </div>
          <input value={draft.link} onChange={(e) => setDraft({ ...draft, link: e.target.value })} placeholder="공유 링크 (구글 드라이브 등, 선택)" style={{ ...stageInputStyle, width: "100%", marginBottom: 8 }} />
          <textarea value={draft.content} onChange={(e) => setDraft({ ...draft, content: e.target.value })} placeholder="제안서 요약 내용" style={stageTextareaStyle} />
          <div style={{ display: "flex", alignItems: "center", gap: 10, marginTop: 8, flexWrap: "wrap" }}>
            <label className="flex items-center gap-2" style={{ ...stageInputStyle, cursor: "pointer", background: DASH.brassSoft }}>
              📎 파일 첨부 (1.5MB 이하)
              <input type="file" onChange={handleFilePick} style={{ display: "none" }} />
            </label>
            {pendingFile && <span style={{ fontSize: 12, color: DASH.inkSoft }}>{pendingFile.name}</span>}
            {fileWarning && <span style={{ fontSize: 11.5, color: DASH.red }}>{fileWarning}</span>}
          </div>
          <button onClick={addEntry} style={{ marginTop: 10, fontSize: 12.5, fontWeight: 700, padding: "8px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy }}>+ 제안서 추가</button>
        </Card>

        <Card>
          {current.entries.length === 0 ? (
            <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>{projectName}에 등록된 제안서가 없습니다.</div>
          ) : [...current.entries].sort((a, b) => (a.date < b.date ? 1 : -1)).map((e, i, arr) => (
            <div key={e.id} style={{ padding: "14px 16px", borderBottom: i === arr.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 4 }}>
                <div>
                  <span style={{ fontSize: 13.5, fontWeight: 700, color: DASH.ink }}>{e.title}</span>
                  <span style={{ fontSize: 11.5, color: DASH.inkFaint, marginLeft: 8 }}>{fmtYMDLabel(e.date)}</span>
                </div>
                <StageDeleteBtn onClick={() => removeEntry(e.id)} />
              </div>
              {e.content && <div style={{ fontSize: 12.5, color: DASH.inkSoft, lineHeight: 1.5, marginBottom: 6 }}>{e.content}</div>}
              <div style={{ display: "flex", gap: 12 }}>
                {e.link && <a href={e.link} target="_blank" rel="noreferrer" style={{ fontSize: 12, color: DASH.blue }}>🔗 링크 열기</a>}
                {e.fileDataUrl && <a href={e.fileDataUrl} download={e.fileName} style={{ fontSize: 12, color: DASH.blue }}>📎 {e.fileName} 다운로드</a>}
              </div>
            </div>
          ))}
        </Card>
      </div>
    </div>
  );
}
