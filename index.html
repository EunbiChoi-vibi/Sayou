function makeGlyphIcon(glyph) {
  return function Icon({ size = 16, style, ...props }) {
    return React.createElement(
      "span",
      { style: { fontSize: size, lineHeight: 1, display: "inline-block", ...style }, ...props },
      glyph
    );
  };
}

if (!window.storage) {
  window.storage = {
    async get(key, shared) {
      const raw = localStorage.getItem("dash_" + key);
      if (raw === null) throw new Error("not found");
      return { key, value: raw, shared: !!shared };
    },
    async set(key, value, shared) {
      localStorage.setItem("dash_" + key, value);
      return { key, value, shared: !!shared };
    },
    async delete(key, shared) {
      localStorage.removeItem("dash_" + key);
      return { key, deleted: true, shared: !!shared };
    },
    async list(prefix, shared) {
      const keys = [];
      for (let i = 0; i < localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && k.startsWith("dash_" + (prefix || ""))) keys.push(k.slice(5));
      }
      return { keys, prefix, shared: !!shared };
    },
  };
}

function fmtYMDLabel(s) {
  const d = parseYMD(s);
  if (!d) return "";
  return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, "0")}.${String(d.getDate()).padStart(2, "0")}`;
}
function buildMonthGrid(monthDate) {
  const year = monthDate.getFullYear(), month = monthDate.getMonth();
  const firstOfMonth = new Date(year, month, 1);
  const startWeekday = firstOfMonth.getDay();
  const gridStart = new Date(year, month, 1 - startWeekday);
  const lastOfMonth = new Date(year, month + 1, 0);
  const endWeekday = lastOfMonth.getDay();
  const gridEnd = new Date(year, month, lastOfMonth.getDate() + (6 - endWeekday));
  const days = [];
  const cur = new Date(gridStart);
  while (cur <= gridEnd) { days.push(new Date(cur)); cur.setDate(cur.getDate() + 1); }
  return days;
}

function StatCards() {
  const [counts, setCounts] = useState(null);

  useEffect(() => {
    let cancelled = false;
    async function getStore(key) {
      try {
        const res = await window.storage.get(key, true);
        return res && res.value ? JSON.parse(res.value) : null;
      } catch (e) {
        return null;
      }
    }
    (async () => {
      const [sites, tasksStore, issues, payments] = await Promise.all([
        getStore(PIPELINE_STORAGE_KEY),
        getStore(TASKS_STORAGE_KEY),
        getStore(ISSUES_STORAGE_KEY),
        getStore(PAYMENTS_STORAGE_KEY),
      ]);
      if (cancelled) return;

      const siteList = Array.isArray(sites) ? sites : [];
      const activeSites = siteList.filter((s) => s.stage !== "종료");

      const tasks = (tasksStore && tasksStore.tasks) || [];
      const tasksDone = tasks.filter((t) => t.done).length;
      const tasksLeft = tasks.length - tasksDone;

      const issueList = Array.isArray(issues) ? issues : [];
      const unresolvedIssues = issueList.filter((it) => it.status !== "완료").length;

      const paymentList = Array.isArray(payments) ? payments : [];
      const unpaidPayments = paymentList.filter((p) => !p.done);
      const unpaidTotal = unpaidPayments.reduce((s, p) => s + (Number(p.amount) || 0), 0);

      setCounts({
        activeSites: activeSites.length,
        totalSites: siteList.length,
        tasksLeft,
        tasksDone,
        unresolvedIssues,
        unpaidCount: unpaidPayments.length,
        unpaidTotal,
      });
    })();
    return () => { cancelled = true; };
  }, []);

  const c = counts || { activeSites: 0, totalSites: 0, tasksLeft: 0, tasksDone: 0, unresolvedIssues: 0, unpaidCount: 0, unpaidTotal: 0 };

  const stats = [
    { label: "진행 현장", value: String(c.activeSites), unit: "건", meta: `진행 중 ${c.activeSites} · 종료 ${c.totalSites - c.activeSites}`, bar: DASH.navy },
    { label: "오늘 할 일", value: String(c.tasksLeft), unit: "건", meta: `완료 ${c.tasksDone} · 남은 ${c.tasksLeft}`, bar: DASH.amber },
    { label: "지연 위험", value: String(c.unresolvedIssues), unit: "건", meta: "해결 필요 현장 이슈 기준", bar: DASH.red },
    { label: "결제 확인 필요", value: String(c.unpaidCount), unit: "건", meta: `미결제 합계 ${c.unpaidTotal.toLocaleString("ko-KR")}원`, bar: DASH.teal },
  ];
  return (
    <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: 14, marginBottom: 30 }}>
      {stats.map((s) => (
        <Card key={s.label} style={{ padding: "18px 18px 16px", position: "relative", overflow: "hidden" }}>
          <div style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: 3, background: s.bar }} />
          <div style={{ fontSize: 12, color: DASH.inkSoft, marginBottom: 10, fontWeight: 500 }}>{s.label}</div>
          <div style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 28, fontWeight: 700, color: DASH.navy, lineHeight: 1 }}>
            {s.value}<span style={{ fontSize: 13, fontWeight: 500, color: DASH.inkSoft, marginLeft: 3 }}>{s.unit}</span>
          </div>
          <div style={{ fontSize: 11.5, color: DASH.inkFaint, marginTop: 8 }}>{s.meta}</div>
        </Card>
      ))}
    </div>
  );
}

const PIPELINE_STAGE_ORDER = ["상담", "실측", "제안서", "견적", "계약", "시공", "AS"];
const PIPELINE_STAGE_ALL = [...PIPELINE_STAGE_ORDER, "종료"];
const PIPELINE_STORAGE_KEY = "interior-dashboard-pipeline-sites-v1";
function makePipelineSiteId() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36); }
function defaultPipelineSites() {
  const list = [];
  pipelineData.forEach((col) => {
    col.sites.forEach((s) => list.push({ id: makePipelineSiteId(), stage: col.stage, name: s.name, addr: s.addr, type: s.type, date: s.date, pm: s.pm }));
  });
  return list;
}

function Pipeline() {
  const [sites, setSites] = useState(defaultPipelineSites);
  const [loaded, setLoaded] = useState(false);
  const [saveStatus, setSaveStatus] = useState("idle");
  const [showAddForm, setShowAddForm] = useState(false);
  const [draft, setDraft] = useState({ name: "", addr: "", type: "주거공간", stage: "상담", pm: "", date: "" });
  const [confirmClear, setConfirmClear] = useState(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(PIPELINE_STORAGE_KEY, true);
        if (!cancelled && res && res.value) {
          const parsed = JSON.parse(res.value);
          if (Array.isArray(parsed)) setSites(parsed);
        }
      } catch (e) {
        // first run — keep seed defaults
      } finally {
        if (!cancelled) setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(PIPELINE_STORAGE_KEY, JSON.stringify(sites), true);
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 600);
    return () => clearTimeout(t);
  }, [sites, loaded]);

  const activeSites = sites.filter((s) => s.stage !== "종료");
  const columns = PIPELINE_STAGE_ORDER.map((stage) => ({ stage, sites: sites.filter((s) => s.stage === stage) }));

  function addSite() {
    if (!draft.name.trim()) return;
    setSites((prev) => [...prev, { id: makePipelineSiteId(), name: draft.name.trim(), addr: draft.addr.trim(), type: draft.type, stage: draft.stage, pm: draft.pm.trim(), date: draft.date }]);
    setDraft({ name: "", addr: "", type: "주거공간", stage: "상담", pm: "", date: "" });
    setShowAddForm(false);
  }
  function removeSite(id) {
    const target = sites.find((s) => s.id === id);
    setSites((prev) => prev.filter((s) => s.id !== id));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }
  function clearAllSites() {
    const pageIds = sites.map((s) => s.notionPageId).filter(Boolean);
    setSites([]);
    setConfirmClear(false);
    pageIds.forEach((pid) => notionSync.archivePage(pid));
  }

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-pipeline-v1", "7523128efdd84be1936343c9e28d9fad", async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const s of sites) {
      const props = {
        "이름": notionTitleProp(s.name),
        "주소": notionTextProp(s.addr),
        "유형": notionSelectProp(s.type),
        "단계": notionSelectProp(s.stage),
        "담당자": notionTextProp(s.pm),
        "날짜": notionTextProp(s.date),
      };
      if (s.notionPageId) {
        await notionUpdatePage(workerUrl, s.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        setSites((prev) => prev.map((x) => (x.id === s.id ? { ...x, notionPageId: page.id } : x)));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...sites.map((s) => s.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { page_size: 100 });
    const newSites = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const stage = notionPlainText(props["단계"]);
      newSites.push({
        id: makePipelineSiteId(),
        name: notionPlainText(props["이름"]) || "(이름 없음)",
        addr: notionPlainText(props["주소"]),
        type: notionPlainText(props["유형"]) || "주거공간",
        stage: PIPELINE_STAGE_ORDER.includes(stage) ? stage : "상담",
        pm: notionPlainText(props["담당자"]),
        date: notionPlainText(props["날짜"]),
        notionPageId: page.id,
      });
      pulled++;
    });
    if (newSites.length) setSites((prev) => [...prev, ...newSites]);
    return { pushed, pulled, updated };
  });

  return (
    <section style={{ marginBottom: 34 }}>
      <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14, gap: 12, flexWrap: "wrap" }}>
        <h2 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 18, fontWeight: 600, color: DASH.navy, margin: 0 }}>프로젝트 진행 현황</h2>
        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <span style={{ fontSize: 12, color: DASH.inkFaint }}>총 {activeSites.length}건 · 단계별 카드{sites.length > activeSites.length ? ` (종료 ${sites.length - activeSites.length}건 숨김)` : ""}</span>
          <button onClick={() => setShowAddForm((v) => !v)} style={{ fontSize: 11.5, fontWeight: 700, padding: "5px 11px", borderRadius: 100, border: `1px solid ${DASH.line}`, background: showAddForm ? DASH.navy : DASH.surface, color: showAddForm ? "#fff" : DASH.navy }}>
            {showAddForm ? "닫기" : "+ 프로젝트 추가"}
          </button>
          {sites.length > 0 && (
            confirmClear ? (
              <span style={{ display: "flex", alignItems: "center", gap: 4 }}>
                <span style={{ fontSize: 11, color: DASH.red }}>전체 삭제할까요?</span>
                <button onClick={clearAllSites} style={{ fontSize: 11, fontWeight: 700, padding: "5px 9px", borderRadius: 100, border: "none", background: DASH.red, color: "#fff" }}>삭제</button>
                <button onClick={() => setConfirmClear(false)} style={{ fontSize: 11, fontWeight: 600, padding: "5px 9px", borderRadius: 100, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.inkSoft }}>취소</button>
              </span>
            ) : (
              <button onClick={() => setConfirmClear(true)} style={{ fontSize: 11.5, fontWeight: 600, padding: "5px 11px", borderRadius: 100, border: `1px solid ${DASH.line}`, background: "transparent", color: DASH.inkFaint }}>전체 삭제</button>
            )
          )}
        </div>
      </div>

      {showAddForm && (
        <Card style={{ padding: 14, marginBottom: 12 }}>
          <div style={{ display: "grid", gridTemplateColumns: "1.3fr 1.6fr 1fr 1fr 1fr 1fr auto", gap: 8 }}>
            <input value={draft.name} onChange={(e) => setDraft({ ...draft, name: e.target.value })} placeholder="프로젝트명" style={stageInputStyle} />
            <input value={draft.addr} onChange={(e) => setDraft({ ...draft, addr: e.target.value })} placeholder="주소" style={stageInputStyle} />
            <select value={draft.type} onChange={(e) => setDraft({ ...draft, type: e.target.value })} style={stageInputStyle}>
              <option value="주거공간">주거공간</option>
              <option value="상업공간">상업공간</option>
              <option value="사무공간">사무공간</option>
            </select>
            <select value={draft.stage} onChange={(e) => setDraft({ ...draft, stage: e.target.value })} style={stageInputStyle}>
              {PIPELINE_STAGE_ALL.map((s) => <option key={s} value={s}>{s}</option>)}
            </select>
            <input value={draft.pm} onChange={(e) => setDraft({ ...draft, pm: e.target.value })} placeholder="담당자" style={stageInputStyle} />
            <input value={draft.date} onChange={(e) => setDraft({ ...draft, date: e.target.value })} placeholder="날짜 (예: 07.10)" style={stageInputStyle} />
            <button onClick={addSite} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 14px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy, whiteSpace: "nowrap" }}>+ 추가</button>
          </div>
        </Card>
      )}

      <div style={{ display: "grid", gridAutoFlow: "column", gridAutoColumns: 230, gap: 12, overflowX: "auto", paddingBottom: 6 }}>
        {columns.map((col) => (
          <Card key={col.stage} style={{ padding: 14 }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, paddingBottom: 10, borderBottom: `1px dashed ${DASH.line}` }}>
              <span style={{ fontSize: 13.5, fontWeight: 700, color: DASH.navy }}>{col.stage}</span>
              <span style={{ fontSize: 11, fontWeight: 700, color: DASH.navy, background: DASH.brassSoft, padding: "2px 8px", borderRadius: 100 }}>{col.sites.length}</span>
            </div>
            <div style={{ maxHeight: 4 * 92, overflowY: col.sites.length > 4 ? "auto" : "visible", paddingRight: col.sites.length > 4 ? 4 : 0 }}>
              {col.sites.length === 0 ? (
                <div style={{ fontSize: 12, color: DASH.inkFaint, textAlign: "center", padding: "20px 0" }}>없음</div>
              ) : col.sites.map((s) => {
                const tag = TYPE_TAG_STYLE[s.type] || TYPE_TAG_STYLE["주거공간"];
                return (
                  <div key={s.id} style={{ position: "relative", background: DASH.paper, border: `1px solid ${DASH.line}`, borderRadius: 8, padding: "11px 12px", marginBottom: 8 }}>
                    <button
                      onClick={() => removeSite(s.id)}
                      title="삭제"
                      style={{ position: "absolute", top: 6, right: 6, width: 18, height: 18, lineHeight: "16px", textAlign: "center", borderRadius: "50%", border: "none", background: "rgba(180,80,63,0.12)", color: DASH.red, fontSize: 10, cursor: "pointer", padding: 0 }}
                    >✕</button>
                    <div style={{ fontSize: 13, fontWeight: 700, color: DASH.ink, marginBottom: 4, lineHeight: 1.3, paddingRight: 18 }}>{s.name}</div>
                    <div style={{ fontSize: 11, color: DASH.inkSoft, marginBottom: 7, lineHeight: 1.4 }}>{s.addr}</div>
                    <span style={{ display: "inline-block", fontSize: 10, fontWeight: 600, padding: "2px 7px", borderRadius: 5, background: tag.bg, color: tag.fg, marginBottom: 7 }}>{s.type}</span>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", fontSize: 10.5, color: DASH.inkFaint }}>
                      <span>{s.date}</span>
                      <span style={{ display: "flex", alignItems: "center", gap: 5, fontWeight: 600, color: DASH.inkSoft }}>
                        <span style={{ width: 16, height: 16, borderRadius: "50%", background: DASH.navySoft, color: "#fff", fontSize: 8.5, display: "flex", alignItems: "center", justifyContent: "center", fontWeight: 700 }}>{(s.pm || "?").charAt(0)}</span>
                        {s.pm}
                      </span>
                    </div>
                  </div>
                );
              })}
            </div>
          </Card>
        ))}
      </div>

      <div style={{ marginTop: 12, display: "flex", justifyContent: "space-between" }}>
        <NotionStatusBadge sync={notionSync} />
        <div style={{ fontSize: 11, color: saveStatus === "error" ? DASH.red : DASH.inkFaint, textAlign: "right" }}>
          {saveStatus === "saving" ? "저장 중…" : saveStatus === "saved" ? "✓ 자동 저장됨" : saveStatus === "error" ? "저장 실패" : ""}
        </div>
      </div>
    </section>
  );
}

function TodaySchedule() {
  const [entries, setEntries] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(PROJECT_SCHEDULE_STORAGE_KEY, true);
        const parsed = res && res.value ? JSON.parse(res.value) : {};
        const todayStr = ymd(new Date(2026, 6, 3));
        const all = [];
        Object.keys(parsed).forEach((projectName) => {
          (parsed[projectName]?.tasks || []).forEach((t) => {
            const start = t.date, end = t.endDate || t.date;
            if (todayStr >= start && todayStr <= end) all.push({ ...t, projectName });
          });
        });
        if (!cancelled) setEntries(all);
      } catch (e) {
        // no schedule data yet
      } finally {
        if (!cancelled) setLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  return (
    <section style={{ marginBottom: 34 }}>
      <SectionHead num="01" title="오늘 일정" note="프로젝트별 공정표에서 오늘 날짜에 해당하는 항목을 모아 보여줘요" />
      <Card>
        {loading ? (
          <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>불러오는 중…</div>
        ) : entries.length === 0 ? (
          <div style={{ fontSize: 12.5, color: DASH.inkFaint, textAlign: "center", padding: "30px 0" }}>오늘 예정된 공정이 없습니다.</div>
        ) : entries.map((e, i) => {
          const col = colorForType(e.type);
          return (
            <div key={e.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "13px 16px", borderBottom: i === entries.length - 1 ? "none" : `1px solid ${DASH.line}` }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: col.bar, flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13.5, fontWeight: 600, color: DASH.ink }}>{e.projectName} — {e.label}</div>
                <div style={{ fontSize: 11.5, color: DASH.inkSoft }}>{e.type}</div>
              </div>
              {e.date !== e.endDate && <span style={{ fontSize: 10.5, color: DASH.inkFaint, whiteSpace: "nowrap" }}>{fmtYMDLabel(e.date)} ~ {fmtYMDLabel(e.endDate)}</span>}
            </div>
          );
        })}
      </Card>
    </section>
  );
}

async function fetchGoogleProfile(accessToken) {
  const res = await fetch("https://www.googleapis.com/oauth2/v3/userinfo", { headers: { Authorization: `Bearer ${accessToken}` } });
  const profile = await res.json();
  return { email: profile.email, name: profile.name || profile.email, picture: profile.picture || "" };
}

async function registerKnownUser(user) {
  try {
    const r = await window.storage.get(KNOWN_USERS_STORAGE_KEY, true);
    const all = r && r.value ? JSON.parse(r.value) : {};
    const now = Date.now();
    all[user.email] = { ...user, firstSeen: (all[user.email] && all[user.email].firstSeen) || now, lastSeen: now };
    await window.storage.set(KNOWN_USERS_STORAGE_KEY, JSON.stringify(all), true);
    return all;
  } catch (e) {
    return null;
  }
}

function PresenceBar({ me, onLogout }) {
  const [knownUsers, setKnownUsers] = useState({});
  const [presence, setPresence] = useState({});
  const [panelOpen, setPanelOpen] = useState(false);

  useEffect(() => {
    let cancelled = false;
    async function refresh() {
      try {
        const r1 = await window.storage.get(KNOWN_USERS_STORAGE_KEY, true);
        if (!cancelled && r1 && r1.value) setKnownUsers(JSON.parse(r1.value));
      } catch (e) {
        // none yet
      }
      try {
        const r2 = await window.storage.get(PRESENCE_STORAGE_KEY, true);
        if (!cancelled && r2 && r2.value) setPresence(JSON.parse(r2.value));
      } catch (e) {
        // none yet
      }
    }
    refresh();
    const t = setInterval(refresh, 15000);
    return () => { cancelled = true; clearInterval(t); };
  }, []);

  if (!me) return null;

  const now = Date.now();
  const onlineUsers = Object.values(presence).filter((p) => now - p.lastSeen < PRESENCE_TTL_MS);
  const knownList = Object.values(knownUsers).sort((a, b) => b.lastSeen - a.lastSeen);

  return (
    <div style={{ position: "relative" }}>
      <button
        onClick={() => setPanelOpen((v) => !v)}
        className="flex items-center gap-2"
        style={{ fontSize: 11.5, fontWeight: 600, padding: "5px 12px 5px 5px", borderRadius: 100, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.navy, cursor: "pointer" }}
      >
        {me.picture ? (
          <img src={me.picture} alt="" style={{ width: 22, height: 22, borderRadius: "50%" }} />
        ) : (
          <span style={{ width: 22, height: 22, borderRadius: "50%", background: DASH.navy, color: "#fff", fontSize: 10, display: "flex", alignItems: "center", justifyContent: "center" }}>{(me.name || "?").charAt(0)}</span>
        )}
        <span style={{ display: "flex", alignItems: "center", gap: 5 }}>
          <span style={{ width: 6, height: 6, borderRadius: "50%", background: DASH.teal }} />
          접속자 {onlineUsers.length}명
        </span>
      </button>

      {panelOpen && (
        <div style={{ position: "absolute", top: "calc(100% + 8px)", right: 0, width: 260, background: DASH.surface, border: `1px solid ${DASH.line}`, borderRadius: 12, boxShadow: "0 12px 30px -10px rgba(0,0,0,0.25)", padding: 14, zIndex: 200 }}>
          <div style={{ fontSize: 11.5, fontWeight: 700, color: DASH.navy, marginBottom: 8 }}>지금 접속 중 ({onlineUsers.length})</div>
          {onlineUsers.length === 0 ? (
            <div style={{ fontSize: 11.5, color: DASH.inkFaint, marginBottom: 10 }}>없음</div>
          ) : onlineUsers.map((u, i) => (
            <div key={u.name + i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "5px 0" }}>
              <span style={{ width: 8, height: 8, borderRadius: "50%", background: DASH.teal, flexShrink: 0 }} />
              <span style={{ fontSize: 12.5, color: DASH.ink }}>{u.name}</span>
            </div>
          ))}
          <div style={{ fontSize: 11.5, fontWeight: 700, color: DASH.navy, margin: "12px 0 8px", paddingTop: 10, borderTop: `1px solid ${DASH.line}` }}>전체 로그인 기록 ({knownList.length})</div>
          <div style={{ maxHeight: 160, overflowY: "auto" }}>
            {knownList.map((u) => (
              <div key={u.email} style={{ display: "flex", justifyContent: "space-between", gap: 8, padding: "4px 0", fontSize: 11.5 }}>
                <span style={{ color: DASH.inkSoft, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{u.name}</span>
                <span style={{ color: DASH.inkFaint, whiteSpace: "nowrap" }}>{new Date(u.lastSeen).toLocaleString("ko-KR", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" })}</span>
              </div>
            ))}
          </div>
          {onLogout && (
            <button onClick={onLogout} style={{ marginTop: 12, width: "100%", fontSize: 11.5, fontWeight: 600, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.red }}>
              이 기기에서 로그아웃
            </button>
          )}
        </div>
      )}
    </div>
  );
}

/* ============================================================================
   로그인 게이트 — 구글 최초 로그인 전에는 대시보드 내용을 볼 수 없도록 막습니다.
   한 번 로그인하면 이 기기(브라우저)에 기록이 남아서 다음부터는 자동으로 통과됩니다.
   ============================================================================ */
function LoginGate({ onLoggedIn }) {
  const [clientId, setClientId] = useState(DEFAULT_GOOGLE_CLIENT_ID);
  const [clientIdLoaded, setClientIdLoaded] = useState(false);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const tokenClientRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r = await window.storage.get(GOOGLE_CLIENT_ID_STORAGE_KEY, true);
        if (!cancelled && r && r.value) setClientId(r.value);
      } catch (e) {
        // 저장된 값이 없으면 기본값(DEFAULT_GOOGLE_CLIENT_ID)을 그대로 씁니다
      } finally {
        if (!cancelled) setClientIdLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  function login() {
    setError("");
    if (!clientId.trim()) {
      setError("아직 Google 클라이언트 ID가 설정되지 않았어요. 관리자에게 먼저 설정을 요청해주세요.");
      return;
    }
    setBusy(true);
    const timeoutId = setTimeout(() => {
      setBusy(false);
      setError("로그인 창이 뜨지 않았어요. 브라우저 주소창의 팝업 차단 아이콘을 눌러 '항상 허용'으로 바꾼 뒤 다시 시도해주세요.");
    }, 15000);
    function clearBusyTimeout() { clearTimeout(timeoutId); }
    function start() {
      if (!tokenClientRef.current) {
        tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: PROFILE_SCOPE,
          callback: async (resp) => {
            clearBusyTimeout();
            if (!resp || !resp.access_token) {
              setBusy(false);
              setError("구글 로그인에 실패했습니다. 다시 시도해주세요.");
              return;
            }
            try {
              const user = await fetchGoogleProfile(resp.access_token);
              if (!ALLOWED_EMAILS.includes(user.email)) {
                setError(`${user.email} 계정은 이 대시보드 접근 권한이 없어요. 관리자에게 문의해주세요.`);
                setBusy(false);
                return;
              }
              await registerKnownUser(user);
              await window.storage.set(MY_IDENTITY_STORAGE_KEY, JSON.stringify(user), false);
              onLoggedIn(user);
            } catch (e) {
              setError("로그인 처리 중 문제가 발생했습니다. 다시 시도해주세요.");
            } finally {
              setBusy(false);
            }
          },
          error_callback: (err) => {
            clearBusyTimeout();
            setBusy(false);
            setError(err && err.type === "popup_failed_to_open"
              ? "팝업이 차단되어 로그인 창이 뜨지 못했어요. 주소창의 팝업 차단 아이콘을 눌러 이 사이트의 팝업을 허용해주세요."
              : "구글 로그인 창을 여는 데 실패했어요. 다시 시도해주세요.");
          },
        });
      }
      try {
        tokenClientRef.current.requestAccessToken();
      } catch (e) {
        clearBusyTimeout();
        setBusy(false);
        setError("구글 로그인 창을 여는 데 실패했어요. 팝업 차단 여부를 확인하고 다시 시도해주세요.");
      }
    }
    if (window.google && window.google.accounts && window.google.accounts.oauth2) start();
    else loadGoogleScript(start);
  }

  return (
    <div style={{ minHeight: "100vh", background: DASH.navy, display: "flex", alignItems: "center", justifyContent: "center", padding: 24, fontFamily: "'Pretendard', 'Noto Serif KR', sans-serif" }}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@600;700&family=Pretendard:wght@400;500;600;700&display=swap');`}</style>
      <div style={{ background: "#fff", borderRadius: 16, padding: "44px 36px", maxWidth: 380, width: "100%", textAlign: "center", boxShadow: "0 30px 80px -20px rgba(0,0,0,0.5)" }}>
        <img src={LOGO_DATA_URI} alt="SAYOU" style={{ maxWidth: 130, margin: "0 auto 24px", display: "block" }} />
        <h1 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 19, fontWeight: 700, color: DASH.navy, margin: "0 0 8px" }}>SAYOU_PROJECT</h1>
        <p style={{ fontSize: 13, color: DASH.inkSoft, lineHeight: 1.6, margin: "0 0 26px" }}>
          팀 전용 대시보드입니다.<br />구글 계정으로 로그인해야 볼 수 있어요.
        </p>
        <button
          onClick={login}
          disabled={busy || !clientIdLoaded}
          className="flex items-center gap-2"
          style={{ width: "100%", justifyContent: "center", fontSize: 13.5, fontWeight: 700, padding: "12px 16px", borderRadius: 10, border: "none", background: DASH.brass, color: DASH.navy, opacity: busy || !clientIdLoaded ? 0.6 : 1, cursor: busy || !clientIdLoaded ? "not-allowed" : "pointer" }}
        >
          {busy ? "로그인 처리 중…" : "Google 계정으로 로그인"}
        </button>
        {error && <div style={{ marginTop: 14, fontSize: 12, color: DASH.red, lineHeight: 1.5 }}>{error}</div>}
        <div style={{ marginTop: 20, fontSize: 11, color: DASH.inkFaint, lineHeight: 1.6 }}>
          한 번 로그인하면 이 기기에서는 다음부터 자동으로 접속됩니다.
        </div>
      </div>
    </div>
  );
}

const COMPANY_CALENDAR_ID = "ea016c1bcb169a0c4b4302fcbf3c36c8f3c6aafc1093870898f7c19d154df7ae@group.calendar.google.com";

const GoogleSyncPanel = React.forwardRef(function GoogleSyncPanel({ current, updateCurrent, periodFallbackStart, periodFallbackEnd }, ref) {
  const [clientId, setClientId] = useState(DEFAULT_GOOGLE_CLIENT_ID);
  const [clientIdLoaded, setClientIdLoaded] = useState(false);
  const [calendarId] = useState(COMPANY_CALENDAR_ID);
  const [accessToken, setAccessToken] = useState(null);
  const [scriptReady, setScriptReady] = useState(false);
  const [syncStatus, setSyncStatus] = useState({ type: "idle", text: "" });
  const [isSyncing, setIsSyncing] = useState(false);
  const tokenClientRef = useRef(null);
  const syncingRef = useRef(false);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(GOOGLE_CLIENT_ID_STORAGE_KEY, true);
        if (!cancelled && res && res.value) setClientId(res.value);
      } catch (e) {
        // no client id saved yet
      } finally {
        if (!cancelled) setClientIdLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!clientIdLoaded) return;
    const t = setTimeout(() => { window.storage.set(GOOGLE_CLIENT_ID_STORAGE_KEY, clientId, true).catch(() => {}); }, 500);
    return () => clearTimeout(t);
  }, [clientId, clientIdLoaded]);

  function connect() {
    if (!clientId.trim()) return;
    const startTokenClient = () => {
      setScriptReady(true);
      if (!tokenClientRef.current) {
        tokenClientRef.current = window.google.accounts.oauth2.initTokenClient({
          client_id: clientId.trim(),
          scope: GOOGLE_SCOPE,
          callback: (resp) => {
            if (resp && resp.access_token) {
              setAccessToken(resp.access_token);
              setSyncStatus({ type: "ok", text: "✓ 구글 계정에 연결되었습니다." });
            } else {
              setSyncStatus({ type: "err", text: "구글 로그인에 실패했습니다." });
            }
          },
        });
      }
      tokenClientRef.current.requestAccessToken();
    };
    if (window.google && window.google.accounts && window.google.accounts.oauth2) {
      startTokenClient();
    } else {
      loadGoogleScript(startTokenClient);
    }
  }

  function disconnect() {
    if (accessToken && window.google?.accounts?.oauth2?.revoke) {
      window.google.accounts.oauth2.revoke(accessToken, () => {});
    }
    setAccessToken(null);
    setSyncStatus({ type: "idle", text: "연결이 해제되었습니다." });
  }

  async function gcalFetch(path, options = {}) {
    const res = await fetch(`https://www.googleapis.com/calendar/v3/${path}`, {
      ...options,
      headers: { ...(options.headers || {}), Authorization: `Bearer ${accessToken}`, "Content-Type": "application/json" },
    });
    if (!res.ok) {
      const errBody = await res.text();
      throw new Error(`Google API 오류 (${res.status}): ${errBody.slice(0, 200)}`);
    }
    if (res.status === 204) return null;
    return res.json();
  }

  async function deleteEvent(eventId) {
    if (!eventId || !accessToken) return; // 연결 안 돼있으면 조용히 건너뜁니다 — 다음 로그인 후 동기화 때 정리돼요
    try {
      await gcalFetch(`calendars/${encodeURIComponent(calendarId)}/events/${eventId}`, { method: "DELETE" });
    } catch (e) {
      // 이미 지워졌거나 권한 문제 등은 조용히 무시 — 로컬 삭제 자체는 이미 반영됐어요
    }
  }
  React.useImperativeHandle(ref, () => ({ deleteEvent }));

  function addDaysStr(dateStr, n) {
    const d = parseYMD(dateStr);
    d.setDate(d.getDate() + n);
    return ymd(d);
  }

  async function pushTasks() {
    const toPush = current.tasks.filter((t) => !t.googleEventId);
    let count = 0;
    const pushedEventIds = [];
    for (const t of toPush) {
      const body = {
        summary: `[${t.type}] ${t.label}`,
        start: { date: t.date },
        end: { date: addDaysStr(t.endDate || t.date, 1) },
        extendedProperties: { private: { sayouApp: "true", sayouTaskId: t.id } },
      };
      const created = await gcalFetch(`calendars/${encodeURIComponent(calendarId)}/events`, { method: "POST", body: JSON.stringify(body) });
      updateCurrent((proj) => ({ ...proj, tasks: proj.tasks.map((x) => (x.id === t.id ? { ...x, googleEventId: created.id } : x)) }));
      pushedEventIds.push(created.id);
      count++;
    }
    return { count, pushedEventIds };
  }

  async function pullEvents(justPushedIds) {
    const timeMin = `${current.periodStart || periodFallbackStart}T00:00:00Z`;
    const timeMax = `${current.periodEnd || periodFallbackEnd}T23:59:59Z`;
    const data = await gcalFetch(`calendars/${encodeURIComponent(calendarId)}/events?singleEvents=true&timeMin=${encodeURIComponent(timeMin)}&timeMax=${encodeURIComponent(timeMax)}&maxResults=250`);
    // current.tasks may be stale here (it's a prop snapshot from render time), so also fold in
    // whatever pushTasks() just created in this same sync pass to guarantee no re-import.
    const existingGoogleIds = new Set([...current.tasks.map((t) => t.googleEventId).filter(Boolean), ...(justPushedIds || [])]);
    let imported = 0;
    const newTasks = [];
    (data.items || []).forEach((ev) => {
      if (ev.status === "cancelled") return;
      if (existingGoogleIds.has(ev.id)) return;
      if (ev.extendedProperties?.private?.sayouApp === "true") return;
      const m = String(ev.summary || "").match(/^\[(.+?)\]\s*/);
      if (!m) return; // "[공종] 내용" 형식이 아니면(우리가 만든 일정이 아니면) 건너뜁니다
      const startDate = ev.start?.date || (ev.start?.dateTime ? ev.start.dateTime.slice(0, 10) : null);
      if (!startDate) return;
      let endDate = startDate;
      if (ev.end?.date) {
        const d = parseYMD(ev.end.date); d.setDate(d.getDate() - 1); endDate = ymd(d);
      } else if (ev.end?.dateTime) {
        endDate = ev.end.dateTime.slice(0, 10);
      }
      const type = m[1];
      const label = String(ev.summary).slice(m[0].length) || type;
      newTasks.push({ id: makeScheduleRowId(), type, label, date: startDate, endDate, googleEventId: ev.id });
      imported++;
    });
    if (newTasks.length) {
      updateCurrent((proj) => ({ ...proj, tasks: [...proj.tasks, ...newTasks] }));
    }
    return imported;
  }

  async function syncNow(silent) {
    if (!accessToken) { if (!silent) setSyncStatus({ type: "err", text: "먼저 구글 계정을 연결해주세요." }); return; }
    if (syncingRef.current) return; // 중복 클릭/중복 실행 방지 — 이게 없으면 같은 일정이 두 번 생성될 수 있어요
    syncingRef.current = true;
    setIsSyncing(true);
    if (!silent) setSyncStatus({ type: "idle", text: "동기화 중..." });
    try {
      const { count: pushed, pushedEventIds } = await pushTasks();
      const pulled = await pullEvents(pushedEventIds);
      const now = new Date().toLocaleTimeString("ko-KR");
      setSyncStatus({ type: "ok", text: `✓ ${now} 동기화 완료 (내보냄 ${pushed}건 · 가져옴 ${pulled}건)` });
    } catch (err) {
      setSyncStatus({ type: "err", text: err.message || "동기화 중 오류가 발생했습니다." });
    } finally {
      syncingRef.current = false;
      setIsSyncing(false);
    }
  }

  // 30초마다 "일정이 마지막 동기화 때랑 달라졌는지"만 가볍게 확인하고, 달라졌을 때만 실제 동기화를 실행합니다.
  const lastWatchedSnapshotRef = useRef(null);
  useEffect(() => {
    if (!accessToken) return;
    function snapshot() {
      return JSON.stringify(current.tasks.map((t) => [t.id, t.type, t.label, t.date, t.endDate]));
    }
    const watchId = setInterval(() => {
      const snap = snapshot();
      if (snap !== lastWatchedSnapshotRef.current) {
        lastWatchedSnapshotRef.current = snap;
        syncNow(true);
      }
    }, 30000);
    if (lastWatchedSnapshotRef.current === null) lastWatchedSnapshotRef.current = snapshot();
    return () => clearInterval(watchId);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [accessToken, current.tasks]);

  const statusColor = syncStatus.type === "ok" ? DASH.teal : syncStatus.type === "err" ? DASH.red : DASH.inkSoft;

  return (
    <Card style={{ padding: 16, marginBottom: 14 }}>
      <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 10, flexWrap: "wrap", gap: 10 }}>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy }}>Google 캘린더 연동 (양방향)</div>
        <span style={{ fontSize: 11.5, color: statusColor }}>{syncStatus.text}</span>
      </div>
      <div style={{ display: "flex", alignItems: "flex-end", gap: 10, flexWrap: "wrap" }}>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>Google OAuth 클라이언트 ID</label>
          <input value={clientId} onChange={(e) => setClientId(e.target.value)} placeholder="xxxxx.apps.googleusercontent.com" style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, width: 280 }} />
        </div>
        <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
          <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>캘린더 ID (고정)</label>
          <div title={calendarId} style={{ fontSize: 12, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.brassSoft, color: DASH.navy, width: 220, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{calendarId}</div>
        </div>
        {!accessToken ? (
          <button onClick={connect} disabled={!clientId.trim()} style={{ fontSize: 12.5, fontWeight: 700, padding: "9px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy, opacity: !clientId.trim() ? 0.5 : 1 }}>
            Google 계정 연결
          </button>
        ) : (
          <>
            <button onClick={() => syncNow(false)} disabled={isSyncing} style={{ fontSize: 12.5, fontWeight: 700, padding: "9px 16px", borderRadius: 8, border: "none", background: DASH.navy, color: "#fff", opacity: isSyncing ? 0.6 : 1, cursor: isSyncing ? "not-allowed" : "pointer" }}>{isSyncing ? "동기화 중…" : "지금 동기화"}</button>
            <button onClick={disconnect} style={{ fontSize: 12.5, fontWeight: 600, padding: "9px 14px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.surface, color: DASH.inkSoft }}>연결 해제</button>
          </>
        )}
      </div>
      <div style={{ marginTop: 10, fontSize: 11, color: DASH.inkFaint, lineHeight: 1.5 }}>
        이 프로젝트의 공사 시작일~종료일 범위 안에서 서로 없는 일정을 주고받습니다. 연결되어 있는 동안 30초마다 변경 여부를 확인해서, 바뀐 게 있을 때만 자동으로 동기화해요. 브라우저 세션마다 다시 로그인이 필요해요.
      </div>
    </Card>
  );
});

/* ============================================================================
   Notion 연동 — 공용 헬퍼 (CORS 때문에 브라우저에서 노션 API를 직접 호출할 수 없어서,

const NOTION_WORKER_URL_KEY = "interior-dashboard-notion-worker-url-v1";
const DEFAULT_WORKER_URL = "https://sayoudesign.dmsql0928.workers.dev";

async function notionFetch(workerUrl, path, options = {}) {
  const base = workerUrl.replace(/\/$/, "");
  const res = await fetch(`${base}${path}`, {
    ...options,
    headers: { "Content-Type": "application/json", "Notion-Version": "2022-06-28", ...(options.headers || {}) },
  });
  if (!res.ok) {
    const body = await res.text();
    throw new Error(`Notion API 오류 (${res.status}): ${body.slice(0, 200)}`);
  }
  return res.json();
}
async function notionQueryDatabase(workerUrl, databaseId, body = {}) {
  return notionFetch(workerUrl, `/v1/databases/${databaseId}/query`, { method: "POST", body: JSON.stringify(body) });
}
async function notionCreatePage(workerUrl, databaseId, properties) {
  return notionFetch(workerUrl, `/v1/pages`, { method: "POST", body: JSON.stringify({ parent: { database_id: databaseId }, properties }) });
}
async function notionUpdatePage(workerUrl, pageId, properties) {
  return notionFetch(workerUrl, `/v1/pages/${pageId}`, { method: "PATCH", body: JSON.stringify({ properties }) });
}
async function notionArchivePage(workerUrl, pageId) {
  return notionFetch(workerUrl, `/v1/pages/${pageId}`, { method: "PATCH", body: JSON.stringify({ archived: true }) });
}
function notionTitleProp(value) { return { title: [{ text: { content: String(value ?? "(제목 없음)").slice(0, 2000) } }] }; }
function notionTextProp(value) { return { rich_text: [{ text: { content: String(value ?? "").slice(0, 2000) } }] }; }
function notionSelectProp(value) { return value ? { select: { name: String(value).slice(0, 100) } } : { select: null }; }
function notionNumberProp(value) { return { number: Number(value) || 0 }; }
function notionEmailProp(value) { return { email: value ? String(value) : null }; }
function notionDateRangeProp(start, end) {
  if (!start) return { date: null };
  return { date: { start, end: end && end !== start ? end : null } };
}
function notionPlainText(prop) {
  if (!prop) return "";
  switch (prop.type) {
    case "title": return (prop.title || []).map((t) => t.plain_text).join("");
    case "rich_text": return (prop.rich_text || []).map((t) => t.plain_text).join("");
    case "select": return prop.select ? prop.select.name : "";
    case "number": return prop.number == null ? "" : String(prop.number);
    case "email": return prop.email || "";
    case "phone_number": return prop.phone_number || "";
    default: return "";
  }
}
function notionDateValue(prop) {
  if (!prop || prop.type !== "date" || !prop.date) return null;
  return prop.date; // { start, end }
}

/* ---- 화면마다 조용히 백그라운드에서 동기화하는 훅 (입력창 없음, 상태 뱃지만) ---- */
function useNotionAutoSync(dbStorageKey, defaultDatabaseId, onSync) {
  const [workerUrl, setWorkerUrl] = useState(DEFAULT_WORKER_URL);
  const [databaseId, setDatabaseId] = useState(defaultDatabaseId || "");
  const [status, setStatus] = useState({ type: "idle", text: "" });
  const syncingRef = useRef(false);
  const onSyncRef = useRef(onSync);
  onSyncRef.current = onSync;

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const r1 = await window.storage.get(NOTION_WORKER_URL_KEY, true);
        if (!cancelled && r1 && r1.value) setWorkerUrl(r1.value);
      } catch (e) {}
      try {
        const r2 = await window.storage.get(dbStorageKey, true);
        if (!cancelled && r2 && r2.value) setDatabaseId(r2.value);
      } catch (e) {}
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!workerUrl.trim() || !databaseId.trim()) return;
    async function run() {
      if (syncingRef.current) return;
      syncingRef.current = true;
      try {
        const result = await onSyncRef.current(workerUrl.trim(), databaseId.trim());
        const now = new Date().toLocaleTimeString("ko-KR");
        setStatus({ type: "ok", text: `Notion 동기화됨 · ${now}` });
      } catch (err) {
        setStatus({ type: "err", text: `Notion 오류: ${(err && err.message) || "동기화 실패"}` });
      } finally {
        syncingRef.current = false;
      }
    }
    run();
    const interval = setInterval(run, 60000);
    return () => clearInterval(interval);
  }, [workerUrl, databaseId]);

  return {
    status,
    configured: !!(workerUrl.trim() && databaseId.trim()),
    archivePage: async (pageId) => {
      if (!pageId || !workerUrl.trim()) return;
      try {
        await notionArchivePage(workerUrl.trim(), pageId);
      } catch (e) {
        // 노션 쪽 보관 실패는 조용히 무시 — 다음 동기화 때 다시 시도됩니다
      }
    },
  };
}

function NotionStatusBadge({ sync }) {
  if (!sync) return null;
  if (!sync.configured) {
    return <span style={{ fontSize: 11, color: DASH.inkFaint }}>Notion 미설정 (우측 상단 ⚙ 에서 설정)</span>;
  }
  const color = sync.status.type === "err" ? DASH.red : DASH.teal;
  return <span style={{ fontSize: 11, color }}>{sync.status.text || "Notion 연동 대기 중…"}</span>;
}

    const o = {};
    NOTION_MODULES.forEach((m) => { o[m.key] = m.defaultDatabaseId || ""; });
    return o;
  });
  const [loaded, setLoaded] = useState(false);
  const [locked, setLocked] = useState(false);
  const [saving, setSaving] = useState(false);

  useEffect(() => {
    if (!open) return;
    let cancelled = false;
    (async () => {
      let hasWorker = false;
      try {
        const r = await window.storage.get(NOTION_WORKER_URL_KEY, true);
        if (!cancelled && r && r.value) { setWorkerUrl(r.value); hasWorker = true; }
      } catch (e) {}
      const nextIds = {};
      for (const m of NOTION_MODULES) {
        try {
          const r = await window.storage.get(m.dbStorageKey, true);
          nextIds[m.key] = r && r.value ? r.value : (m.defaultDatabaseId || "");
        } catch (e) {
          nextIds[m.key] = m.defaultDatabaseId || "";
        }
      }
      if (!cancelled) {
        setDbIds((prev) => ({ ...prev, ...nextIds }));
        setLocked(hasWorker);
        setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, [open]);

  async function saveAll() {
    setSaving(true);
    try {
      await window.storage.set(NOTION_WORKER_URL_KEY, workerUrl.trim(), true);
      for (const m of NOTION_MODULES) {
        await window.storage.set(m.dbStorageKey, (dbIds[m.key] || "").trim(), true);
      }
      await window.storage.set(NOTION_CONFIGURED_KEY, "1", true);
      setLocked(true);
    } finally {
      setSaving(false);
    }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(30,26,22,0.45)", zIndex: 1000, display: "flex", alignItems: "flex-start", justifyContent: "center", padding: "40px 16px", overflowY: "auto" }} onClick={onClose}>

        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
          <div>
            <div style={{ fontSize: 11.5, letterSpacing: ".1em", textTransform: "uppercase", color: DASH.brass, fontWeight: 700 }}>Notion Integration</div>
            <h2 style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 19, fontWeight: 700, color: DASH.navy, margin: "4px 0" }}>노션 연동 설정</h2>
          </div>
          <button onClick={onClose} style={{ border: "none", background: "transparent", color: DASH.inkSoft, fontSize: 18, cursor: "pointer", padding: 4 }}>✕</button>
        </div>
        <p style={{ fontSize: 12.5, color: DASH.inkSoft, lineHeight: 1.6, marginBottom: 16 }}>
          여기서 한 번만 설정하면, 대시보드의 모든 화면이 자동으로 백그라운드에서 노션과 동기화됩니다(1분마다). 이 링크를 여는 다른 팀원도 다시 입력할 필요 없이 바로 사용할 수 있어요.
        </p>

        {locked && (
          <div style={{ background: DASH.tealSoft, color: DASH.teal, fontSize: 12, fontWeight: 600, padding: "10px 14px", borderRadius: 8, marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
            <span>✓ 이미 설정되어 저장되어 있습니다.</span>
            <button onClick={() => setLocked(false)} style={{ fontSize: 11.5, fontWeight: 700, border: "none", background: "transparent", color: DASH.teal, textDecoration: "underline", cursor: "pointer" }}>수정하기</button>

function ProjectSchedule() {
  const [schedules, setSchedules] = useState({});
  const [loaded, setLoaded] = useState(false);
  const [projectName, setProjectName] = useState("");
  const [pipelineSites, setPipelineSites] = useState([]);
  const [customInput, setCustomInput] = useState("");
  const [saveStatus, setSaveStatus] = useState("idle");
  const [uploadStatus, setUploadStatus] = useState({ type: "idle", text: "'공종 · 날짜별 칸'으로 작성된 엑셀을 그대로 업로드하면 캘린더에 자동 반영됩니다." });
  const [monthDate, setMonthDate] = useState(new Date(2026, 6, 1));
  const [newTask, setNewTask] = useState({ type: "", label: "", date: "2026-07-06", endDate: "2026-07-06", projectName: "" });
  const fileInputRef = useRef(null);
  const googleSyncRef = useRef(null);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      let loadedSchedules = null;
      try {
        const res = await window.storage.get(PROJECT_SCHEDULE_STORAGE_KEY, true);
        if (res && res.value) {
          const parsed = JSON.parse(res.value);
          if (parsed && typeof parsed === "object") loadedSchedules = parsed;
        }
      } catch (e) {
        // first run
      }
      let sites = [];
      try {
        const res3 = await window.storage.get(PIPELINE_STORAGE_KEY, true);
        const parsed3 = res3 && res3.value ? JSON.parse(res3.value) : [];
        if (Array.isArray(parsed3)) sites = parsed3;
      } catch (e) {
        // no pipeline sites yet
      }
      let lastProject = null;
      try {
        const res2 = await window.storage.get(LAST_PROJECT_STORAGE_KEY, true);
        if (res2 && res2.value) lastProject = res2.value;
      } catch (e) {
        // no saved selection yet
      }
      if (!cancelled) {
        if (loadedSchedules) setSchedules(loadedSchedules);
        setPipelineSites(sites);
        const realNames = Array.from(new Set([...sites.map((s) => s.name), ...(loadedSchedules ? Object.keys(loadedSchedules) : [])]));
        if (lastProject && realNames.includes(lastProject)) {
          setProjectName(lastProject);
        } else if (realNames.length > 0) {
          setProjectName(realNames[0]);
        }
        setLoaded(true);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  useEffect(() => {
    if (!loaded || !projectName) return;
    window.storage.set(LAST_PROJECT_STORAGE_KEY, projectName, true).catch(() => {});
  }, [projectName, loaded]);

  useEffect(() => {
    if (!loaded) return;
    setSaveStatus("saving");
    const t = setTimeout(async () => {
      try {
        await window.storage.set(PROJECT_SCHEDULE_STORAGE_KEY, JSON.stringify(schedules), true);
        setSaveStatus("saved");
      } catch (e) {
        setSaveStatus("error");
      }
    }, 600);
    return () => clearTimeout(t);
  }, [schedules, loaded]);

  useEffect(() => {
    if (loaded && projectName && !schedules[projectName]) {
      setSchedules((prev) => ({ ...prev, [projectName]: defaultProjectSchedule() }));
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [projectName, loaded]);

  const current = schedules[projectName] || defaultProjectSchedule();
  const projectOptions = Array.from(new Set([...pipelineSites.map((s) => s.name), ...Object.keys(schedules)])).filter(Boolean);
  const usedProcessTypes = Object.values(schedules).flatMap((proj) => (proj.tasks || []).map((t) => t.type)).filter(Boolean);
  const availableProcessTypes = Array.from(new Set([...STANDARD_PROCESS_TYPES, ...usedProcessTypes]));

  function updateCurrent(updater) {
    setSchedules((prev) => ({ ...prev, [projectName]: updater(prev[projectName] || defaultProjectSchedule()) }));
  }
  function setPeriod(field, value) {
    updateCurrent((proj) => ({ ...proj, [field]: value }));
  }
  function addTask() {
    if (!newTask.date || !newTask.type.trim()) return;
    const targetProject = (newTask.projectName || projectName).trim();
    if (!targetProject) return;
    const endDate = newTask.endDate && newTask.endDate >= newTask.date ? newTask.endDate : newTask.date;
    const newEntry = { id: makeScheduleRowId(), type: newTask.type.trim(), label: newTask.label.trim() || newTask.type.trim(), date: newTask.date, endDate };
    setSchedules((prev) => {
      const proj = prev[targetProject] || defaultProjectSchedule();
      return { ...prev, [targetProject]: { ...proj, tasks: [...proj.tasks, newEntry] } };
    });
    setNewTask({ ...newTask, label: "" });
    if (!projectOptions.includes(targetProject)) setProjectName(targetProject);
  }
  function removeTask(id, taskProjectName) {
    const target = taskProjectName || projectName;
    let removedPageId = null;
    let removedEventId = null;
    setSchedules((prev) => {
      const proj = prev[target];
      if (!proj) return prev;
      const removed = proj.tasks.find((t) => t.id === id);
      if (removed && removed.notionPageId) removedPageId = removed.notionPageId;
      if (removed && removed.googleEventId) removedEventId = removed.googleEventId;
      return { ...prev, [target]: { ...proj, tasks: proj.tasks.filter((t) => t.id !== id) } };
    });
    if (removedPageId) notionSync.archivePage(removedPageId);
    if (removedEventId) googleSyncRef.current?.deleteEvent(removedEventId);
  }
  function addCustomProject() {
    const name = customInput.trim();
    if (!name) return;
    setSchedules((prev) => (prev[name] ? prev : { ...prev, [name]: defaultProjectSchedule() }));
    setProjectName(name);
    setCustomInput("");
  }
  function resetProject() {
    const pageIdsToArchive = current.tasks.map((t) => t.notionPageId).filter(Boolean);
    const eventIdsToDelete = current.tasks.map((t) => t.googleEventId).filter(Boolean);
    updateCurrent(() => defaultProjectSchedule());
    pageIdsToArchive.forEach((pid) => notionSync.archivePage(pid));
    eventIdsToDelete.forEach((eid) => googleSyncRef.current?.deleteEvent(eid));
  }
  function goToday() {
    setMonthDate(new Date(2026, 6, 1));
  }
  function shiftMonth(delta) {
    setMonthDate((prev) => new Date(prev.getFullYear(), prev.getMonth() + delta, 1));
  }

  /* ---------- 엑셀 업로드: 실제 '사유공간' 공정표 양식(날짜 헤더 + 휴일 칸) 파싱 ---------- */
  function handleUpload(e) {
    const file = e.target.files[0];
    if (!file) return;
    setUploadStatus({ type: "idle", text: "엑셀 파일을 읽는 중..." });
    const reader = new FileReader();
    reader.onload = (evt) => {
      try {
        const data = new Uint8Array(evt.target.result);
        const wb = XLSX.read(data, { type: "array" });
        const ws = wb.Sheets[wb.SheetNames[0]];
        const grid = XLSX.utils.sheet_to_json(ws, { header: 1, defval: "" });

        let headerRowIdx = -1, labelCol = -1;
        for (let r = 0; r < grid.length && headerRowIdx < 0; r++) {
          const row = grid[r];
          for (let c = 0; c < row.length; c++) {
            if (String(row[c]).trim() === "공종") { headerRowIdx = r; labelCol = c; break; }
          }
        }
        if (headerRowIdx < 0) throw new Error("HEADER");

        // 기간 파싱 (예: "2026.06.12-2026.06.30")
        let periodStartDate = null, periodEndDate = null, parsedProjectName = "";
        for (let r = 0; r < headerRowIdx; r++) {
          const row = grid[r];
          for (let c = 0; c < row.length; c++) {
            const ct = String(row[c] || "").trim();
            if (!ct) continue;
            if (ct.includes("공사명")) {
              const after = ct.split(/공사명\s*[:：]?/)[1];
              if (after && after.trim()) parsedProjectName = after.trim();
              else { for (let cc = c + 1; cc < row.length; cc++) { if (String(row[cc]).trim()) { parsedProjectName = String(row[cc]).trim(); break; } } }
            }
            if (ct.includes("기간")) {
              let rangeText = "";
              const after = ct.split(/기간\s*[:：]?/)[1];
              if (after && after.trim()) rangeText = after.trim();
              else { for (let cc = c + 1; cc < row.length; cc++) { if (String(row[cc]).trim()) { rangeText = String(row[cc]).trim(); break; } } }
              const m = rangeText.match(/(\d{4})[.\-](\d{1,2})[.\-](\d{1,2})\D+(\d{4})[.\-](\d{1,2})[.\-](\d{1,2})/);
              if (m) {
                periodStartDate = new Date(+m[1], +m[2] - 1, +m[3]);
                periodEndDate = new Date(+m[4], +m[5] - 1, +m[6]);
              }
            }
          }
        }
        if (!periodStartDate) throw new Error("PERIOD");

        // 날짜 열 계산: 헤더행에서 라벨열 다음부터 값이 있는 연속 칸
        const headerRow = grid[headerRowIdx];
        let dayStartCol = -1, dayEndCol = -1;
        for (let c = labelCol + 1; c < headerRow.length; c++) {
          const has = String(headerRow[c] || "").trim() !== "";
          if (has && dayStartCol < 0) dayStartCol = c;
          if (has) dayEndCol = c;
        }
        if (dayStartCol < 0) throw new Error("HEADER");
        const dayCount = dayEndCol - dayStartCol + 1;

        // 각 열의 실제 날짜 계산: 이전 칸이 '휴일'이면 +2, 아니면 +1
        const colDates = [];
        let cursor = new Date(periodStartDate);
        for (let i = 0; i < dayCount; i++) {
          if (i === 0) { colDates.push(new Date(cursor)); continue; }
          const prevHeader = String(headerRow[dayStartCol + i - 1] || "").trim();
          cursor = new Date(cursor);
          cursor.setDate(cursor.getDate() + (prevHeader.includes("휴일") ? 2 : 1));
          colDates.push(new Date(cursor));
        }

        // 공종 행 + 짝수 이어지는 행에서 날짜별 작업 텍스트 수집 (연속된 같은 내용은 하나의 기간 일정으로 합침)
        const tasks = [];
        let r = headerRowIdx + 1;
        while (r < grid.length) {
          const row = grid[r];
          const label = String(row[labelCol] || "").trim();
          if (!label) { r++; continue; }
          const nextRow = grid[r + 1] || [];
          const nextLabel = String(nextRow[labelCol] || "").trim();
          const pairRow = nextLabel ? null : nextRow;

          const cellTexts = [];
          for (let i = 0; i < dayCount; i++) {
            const c = dayStartCol + i;
            const t1 = String(row[c] || "").trim();
            const t2 = pairRow ? String(pairRow[c] || "").trim() : "";
            cellTexts.push([t1, t2].filter(Boolean).join(" "));
          }
          let i = 0;
          while (i < dayCount) {
            const text = cellTexts[i];
            if (!text) { i++; continue; }
            let j = i;
            while (j + 1 < dayCount && cellTexts[j + 1] === text) j++;
            tasks.push({ id: makeScheduleRowId(), type: label, label: text, date: ymd(colDates[i]), endDate: ymd(colDates[j]) });
            i = j + 1;
          }
          r += pairRow ? 2 : 1;
        }
        if (tasks.length === 0) throw new Error("NODATA");

        const targetName = parsedProjectName || projectName || file.name.replace(/\.(xlsx|xls)$/i, "");
        setSchedules((prev) => ({
          ...prev,
          [targetName]: { periodStart: ymd(periodStartDate), periodEnd: periodEndDate ? ymd(periodEndDate) : "", tasks },
        }));
        setProjectName(targetName);
        setMonthDate(new Date(periodStartDate.getFullYear(), periodStartDate.getMonth(), 1));
        setUploadStatus({ type: "ok", text: `✓ '${targetName}' 공정표 ${tasks.length}건이 캘린더에 반영되었습니다. (${file.name})` });
      } catch (err) {
        const msgMap = {
          HEADER: "양식을 인식하지 못했습니다. '공종' 헤더와 날짜 열이 포함된 양식인지 확인해주세요.",
          PERIOD: "'기간' 정보를 찾지 못했습니다. (예: 2026.06.12-2026.06.30 형식)",
          NODATA: "일정 데이터를 찾지 못했습니다.",
        };
        setUploadStatus({ type: "err", text: msgMap[err.message] || "파일을 읽지 못했습니다." });
      }
    };
    reader.readAsArrayBuffer(file);
    e.target.value = "";
  }



  const uploadColor = uploadStatus.type === "ok" ? DASH.teal : uploadStatus.type === "err" ? DASH.red : DASH.inkSoft;
  const monthDays = buildMonthGrid(monthDate);
  const todayStr = ymd(new Date(2026, 6, 3));
  const tasksByDate = {};
  Object.keys(schedules).forEach((pName) => {
    const proj = schedules[pName];
    if (!proj || !proj.tasks) return;
    proj.tasks.forEach((t) => {
      const start = parseYMD(t.date);
      const end = parseYMD(t.endDate || t.date) || start;
      if (!start) return;
      const durationDays = Math.round((end - start) / 86400000) + 1;
      const cur = new Date(start);
      while (cur <= end) {
        const key = ymd(cur);
        (tasksByDate[key] = tasksByDate[key] || []).push({ ...t, projectName: pName, isStart: ymd(cur) === t.date, isEnd: ymd(cur) === (t.endDate || t.date), durationDays });
        cur.setDate(cur.getDate() + 1);
      }
    });
  });
  Object.keys(tasksByDate).forEach((key) => {
    tasksByDate[key].sort((a, b) => b.durationDays - a.durationDays || a.id.localeCompare(b.id));
  });

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-schedule-v1", "033d7aff18d74536a2640b9f5190c672", async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const t of current.tasks) {
      const props = {
        "이름": notionTitleProp(`${t.type} · ${t.label}`),
        "프로젝트명": notionSelectProp(projectName),
        "공종": notionSelectProp(t.type),
        "작업내용": notionTextProp(t.label),
        "기간": notionDateRangeProp(t.date, t.endDate),
      };
      if (t.notionPageId) {
        await notionUpdatePage(workerUrl, t.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        updateCurrent((proj) => ({ ...proj, tasks: proj.tasks.map((x) => (x.id === t.id ? { ...x, notionPageId: page.id } : x)) }));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...current.tasks.map((t) => t.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, {
      filter: { property: "프로젝트명", select: { equals: projectName } },
      page_size: 100,
    });
    const newTasks = [];
    (result.results || []).forEach((page) => {
      if (known.has(page.id)) return;
      const props = page.properties;
      const type = notionPlainText(props["공종"]) || "기타";
      const label = notionPlainText(props["작업내용"]) || notionPlainText(props["이름"]) || "(제목 없음)";
      const range = notionDateValue(props["기간"]);
      if (!range || !range.start) return;
      newTasks.push({ id: makeScheduleRowId(), type, label, date: range.start.slice(0, 10), endDate: (range.end || range.start).slice(0, 10), notionPageId: page.id });
      pulled++;
    });
    if (newTasks.length) updateCurrent((proj) => ({ ...proj, tasks: [...proj.tasks, ...newTasks] }));
    return { pushed, pulled, updated };
  });

  return (
    <section style={{ marginBottom: 34 }}>
      <SectionHead title="프로젝트별 공정표" note="실제 날짜 기반 캘린더 · 일정을 입력하면 캘린더에 바로 표시됩니다" />

      <Card style={{ padding: 16, marginBottom: 14 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, flexWrap: "wrap" }}>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>프로젝트(현장) 선택</label>
            <select value={projectName} onChange={(e) => setProjectName(e.target.value)} style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, minWidth: 200 }}>
              {projectOptions.length === 0 && <option value="">추가된 프로젝트 없음</option>}
              {projectOptions.map((p) => <option key={p} value={p}>{p}</option>)}
            </select>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>새 프로젝트 추가</label>
            <div style={{ display: "flex", gap: 6 }}>
              <input value={customInput} onChange={(e) => setCustomInput(e.target.value)} placeholder="프로젝트명 입력" style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink, width: 160 }} />
              <button onClick={addCustomProject} style={{ fontSize: 12.5, fontWeight: 700, padding: "8px 14px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy, whiteSpace: "nowrap" }}>+ 추가</button>
            </div>
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>공사 시작일</label>
            <input type="date" value={current.periodStart} onChange={(e) => setPeriod("periodStart", e.target.value)} style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
            <label style={{ fontSize: 11, color: DASH.inkSoft, fontWeight: 600 }}>공사 종료일</label>
            <input type="date" value={current.periodEnd} onChange={(e) => setPeriod("periodEnd", e.target.value)} style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          </div>
          <span style={{ fontSize: 11.5, color: saveStatus === "error" ? DASH.red : DASH.inkFaint, marginLeft: "auto" }}>
            {saveStatus === "saving" ? "저장 중…" : saveStatus === "saved" ? "✓ 자동 저장됨" : saveStatus === "error" ? "저장 실패" : ""}
          </span>
        </div>
        <div style={{ marginTop: 8 }}><NotionStatusBadge sync={notionSync} /></div>
      </Card>

      <GoogleSyncPanel
        ref={googleSyncRef}
        current={current}
        updateCurrent={updateCurrent}
        periodFallbackStart={ymd(new Date(monthDate.getFullYear(), monthDate.getMonth(), 1))}
        periodFallbackEnd={ymd(new Date(monthDate.getFullYear(), monthDate.getMonth() + 1, 0))}
      />

      <Card style={{ padding: 16, marginBottom: 14 }}>
        <div style={{ fontSize: 12.5, fontWeight: 700, color: DASH.navy, marginBottom: 10 }}>일정 추가</div>
        <div style={{ display: "grid", gridTemplateColumns: "1.2fr 1fr 1.4fr 1fr 1fr auto", gap: 8, alignItems: "center" }}>
          <input list="scheduleProjectOptions" value={newTask.projectName || projectName} onChange={(e) => setNewTask({ ...newTask, projectName: e.target.value })} placeholder="프로젝트명" style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          <datalist id="scheduleProjectOptions">
            {projectOptions.map((p) => <option key={p} value={p} />)}
          </datalist>
          <input list="processTypeOptions" value={newTask.type} onChange={(e) => setNewTask({ ...newTask, type: e.target.value })} placeholder="공종" style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          <datalist id="processTypeOptions">
            {availableProcessTypes.map((t) => <option key={t} value={t} />)}
          </datalist>
          <input value={newTask.label} onChange={(e) => setNewTask({ ...newTask, label: e.target.value })} placeholder="작업 내용 (예: 소방 스프링쿨러)" style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            <label style={{ fontSize: 9.5, color: DASH.inkFaint }}>시작일</label>
            <input type="date" value={newTask.date} onChange={(e) => setNewTask({ ...newTask, date: e.target.value, endDate: e.target.value > newTask.endDate ? e.target.value : newTask.endDate })} style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          </div>
          <div style={{ display: "flex", flexDirection: "column", gap: 2 }}>
            <label style={{ fontSize: 9.5, color: DASH.inkFaint }}>종료일</label>
            <input type="date" value={newTask.endDate} onChange={(e) => setNewTask({ ...newTask, endDate: e.target.value })} min={newTask.date} style={{ fontSize: 12.5, padding: "8px 10px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.ink }} />
          </div>
          <button onClick={addTask} style={{ fontSize: 12.5, fontWeight: 700, padding: "9px 16px", borderRadius: 8, border: "none", background: DASH.brass, color: DASH.navy, whiteSpace: "nowrap" }}>+ 일정 추가</button>
        </div>
        <div style={{ marginTop: 8, fontSize: 11, color: DASH.inkFaint }}>{projectName ? `비워두면 상단에서 선택한 "${projectName}" 프로젝트에 추가돼요. ` : "먼저 프로젝트명을 입력해주세요. "}캘린더에는 모든 프로젝트의 일정이 함께 보이고, 프로젝트마다 다른 색으로 구분돼요.</div>
      </Card>

      <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 12, flexWrap: "wrap" }}>
        <label className="flex items-center gap-2" style={{ fontSize: 12.5, fontWeight: 600, padding: "9px 15px", borderRadius: 8, border: `1px solid ${DASH.navy}`, background: DASH.navy, color: "#fff", cursor: "pointer" }}>
          📤 공정표 엑셀 업로드
          <input ref={fileInputRef} type="file" accept=".xlsx,.xls" onChange={handleUpload} style={{ display: "none" }} />
        </label>
        <button onClick={resetProject} style={{ fontSize: 12.5, fontWeight: 600, padding: "9px 15px", borderRadius: 8, border: `1px solid ${DASH.line}`, background: "transparent", color: DASH.navy }}>
          이 프로젝트 초기화
        </button>
        <span style={{ fontSize: 12, color: uploadColor, fontWeight: uploadStatus.type === "idle" ? 400 : 700 }}>{uploadStatus.text}</span>
      </div>

      <Card style={{ padding: 16 }}>
        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14, flexWrap: "wrap", gap: 10 }}>
          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <button onClick={() => shiftMonth(-1)} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.navy, fontSize: 14 }}>‹</button>
            <div style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 17, fontWeight: 700, color: DASH.navy, minWidth: 110, textAlign: "center" }}>
              {monthDate.getFullYear()}년 {monthDate.getMonth() + 1}월
            </div>
            <button onClick={() => shiftMonth(1)} style={{ width: 30, height: 30, borderRadius: 8, border: `1px solid ${DASH.line}`, background: DASH.paper, color: DASH.navy, fontSize: 14 }}>›</button>
          </div>
          <button onClick={goToday} style={{ fontSize: 12, fontWeight: 700, padding: "7px 14px", borderRadius: 8, border: `1px solid ${DASH.brass}`, background: DASH.brassSoft, color: "#6B5A3E" }}>오늘</button>
        </div>

        <div style={{ display: "grid", gridTemplateColumns: "repeat(7, 1fr)", borderTop: `1px solid ${DASH.line}`, borderLeft: `1px solid ${DASH.line}` }}>
          {["일", "월", "화", "수", "목", "금", "토"].map((d, i) => (
            <div key={d} style={{ padding: "8px 10px", fontSize: 11.5, fontWeight: 700, color: i === 0 ? DASH.red : i === 6 ? DASH.blue : DASH.inkSoft, borderRight: `1px solid ${DASH.line}`, borderBottom: `1px solid ${DASH.line}`, background: DASH.paper }}>{d}</div>
          ))}
          {monthDays.map((day, idx) => {
            const dStr = ymd(day);
            const inMonth = day.getMonth() === monthDate.getMonth();
            const isToday = dStr === todayStr;
            const dayTasks = tasksByDate[dStr] || [];
            return (
              <div key={idx} style={{ minHeight: 92, padding: 6, borderRight: `1px solid ${DASH.line}`, borderBottom: `1px solid ${DASH.line}`, background: inMonth ? DASH.surface : DASH.paper, opacity: inMonth ? 1 : 0.55 }}>
                <div style={{
                  fontSize: 11.5, fontWeight: 700, marginBottom: 5,
                  color: isToday ? "#fff" : (day.getDay() === 0 ? DASH.red : day.getDay() === 6 ? DASH.blue : DASH.ink),
                  display: "inline-flex", alignItems: "center", justifyContent: "center",
                  width: isToday ? 20 : "auto", height: isToday ? 20 : "auto",
                  borderRadius: "50%", background: isToday ? DASH.brass : "transparent",
                }}>{day.getDate()}</div>
                <div style={{ display: "flex", flexDirection: "column", gap: 3 }}>
                  {dayTasks.map((t) => {
                    const col = colorForProject(t.projectName);
                    const dow = day.getDay();
                    const roundLeft = t.isStart || dow === 0;
                    const roundRight = t.isEnd || dow === 6;
                    return (
                      <div key={t.id} title={`${t.projectName} · ${t.type} · ${t.label}`}
                        style={{
                          fontSize: 10, padding: "3px 6px", margin: 0,
                          marginLeft: roundLeft ? 0 : -6, marginRight: roundRight ? 0 : -6,
                          borderTopLeftRadius: roundLeft ? 5 : 0, borderBottomLeftRadius: roundLeft ? 5 : 0,
                          borderTopRightRadius: roundRight ? 5 : 0, borderBottomRightRadius: roundRight ? 5 : 0,
                          background: col.bg, color: col.fg,
                          borderLeft: roundLeft ? `3px solid ${col.bar}` : "none",
                          lineHeight: 1.3, overflow: "hidden",
                          position: "relative", zIndex: 1,
                          display: "flex", alignItems: "center", justifyContent: "space-between", gap: 4,
                        }}
                      >
                        <span style={{ overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{roundLeft ? `${t.projectName} · ${t.label}` : "\u00A0"}</span>
                        {roundRight && (
                          <button
                            onClick={(e) => { e.stopPropagation(); removeTask(t.id, t.projectName); }}
                            title="일정 삭제 (연결된 전체 일정이 삭제돼요)"
                            style={{ flexShrink: 0, width: 14, height: 14, lineHeight: "13px", textAlign: "center", borderRadius: "50%", border: "none", background: "rgba(0,0,0,0.12)", color: col.fg, fontSize: 9, cursor: "pointer", padding: 0 }}
                          >×</button>
                        )}
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })}
        </div>
        <div style={{ marginTop: 10, fontSize: 11, color: DASH.inkFaint }}>일정 칩의 × 버튼을 눌러야 삭제됩니다. (칩을 클릭만 하면 삭제되지 않아요)</div>
      </Card>
    </section>
  );
}

function IssuesAndAS() {
  const [issues, setIssues, issuesLoaded] = useProjectStore(ISSUES_STORAGE_KEY, []);
  const [draft, setDraft] = useState({ siteName: "", title: "", desc: "", status: "접수" });
  const [asEntries, setAsEntries] = useState([]);
  const [asLoading, setAsLoading] = useState(true);

  useEffect(() => {
    let cancelled = false;
    (async () => {
      try {
        const res = await window.storage.get(AS_STORAGE_KEY, true);
        const parsed = res && res.value ? JSON.parse(res.value) : {};
        const all = [];
        Object.keys(parsed).forEach((projectName) => {
          (parsed[projectName]?.entries || []).forEach((e) => all.push({ ...e, projectName }));
        });
        all.sort((a, b) => (a.date < b.date ? -1 : 1));
        if (!cancelled) setAsEntries(all.slice(0, 6));
      } catch (e) {
        // no AS data yet
      } finally {
        if (!cancelled) setAsLoading(false);
      }
    })();
    return () => { cancelled = true; };
  }, []);

  function addIssue() {
    if (!draft.title.trim()) return;
    setIssues((prev) => [...prev, { id: makeStageId(), siteName: draft.siteName.trim(), title: draft.title.trim(), desc: draft.desc.trim(), status: draft.status, priority: prev.length ? Math.max(...prev.map((x) => x.priority || 0)) + 1 : 1 }]);
    setDraft({ siteName: "", title: "", desc: "", status: "접수" });
  }
  function removeIssue(id) {
    const target = issues.find((x) => x.id === id);
    setIssues((prev) => prev.filter((x) => x.id !== id));
    if (target && target.notionPageId) notionSync.archivePage(target.notionPageId);
  }

  const notionSync = useNotionAutoSync("interior-dashboard-notion-db-issues-v1", NOTION_DB_ISSUES, async (workerUrl, databaseId) => {
    let pushed = 0, pulled = 0, updated = 0;
    const justPushedIds = [];
    for (const it of issues) {
      const props = {
        "이름": notionTitleProp(it.title),
        "프로젝트명": notionSelectProp(it.siteName),
        "설명": notionTextProp(it.desc),
        "상태": notionSelectProp(it.status),
        "우선순위": notionNumberProp(it.priority ?? 999),
      };
      if (it.notionPageId) {
        await notionUpdatePage(workerUrl, it.notionPageId, props);
        updated++;
      } else {
        const page = await notionCreatePage(workerUrl, databaseId, props);
        setIssues((prev) => prev.map((x) => (x.id === it.id ? { ...x, notionPageId: page.id } : x)));
        justPushedIds.push(page.id);
        pushed++;
      }
    }
    const known = new Set([...issues.map((x) => x.notionPageId).filter(Boolean), ...justPushedIds]);
    const result = await notionQueryDatabase(workerUrl, databaseId, { page_size: 100 });
    const newIssues = [];
    const remoteUpdates = {};
    (result.results || []).forEach((page) => {
      const props = page.properties;
      if (known.has(page.id)) {
        // 노션에서 우선순위/상태를 직접 바꾼 경우, 여기서 다시 가져와 반영합니다.
        const p = notionPlainText(props["우선순위"]);
        const st = notionPlainText(props["상태"]);
        remoteUpdates[page.id] = { priority: p === "" ? undefined : Number(p), status: st || undefined };
        return;
      }
      newIssues.push({
        id: makeStageId(),
        siteName: notionPlainText(props["프로젝트명"]),
        title: notionPlainText(props["이름"]) || "(제목 없음)",
        desc: notionPlainText(props["설명"]),
        status: notionPlainText(props["상태"]) || "접수",
        priority: Number(notionPlainText(props["우선순위"])) || 999,
        notionPageId: page.id,
      });
      pulled++;
    });
    setIssues((prev) => {
      const withUpdates = prev.map((x) => {
        if (x.notionPageId && remoteUpdates[x.notionPageId]) {
          const u = remoteUpdates[x.notionPageId];
          return { ...x, priority: u.priority ?? x.priority, status: u.status ?? x.status };
        }
        return x;
      });
      return newIssues.length ? [...withUpdates, ...newIssues] : withUpdates;
    });
    return { pushed, pulled, updated };
  });

  const sortedIssues = [...issues].sort((a, b) => (a.priority ?? 999) - (b.priority ?? 999));
  const issueStatusMap = { "완료": "schedule", "처리중": "processing", "접수": "received" };

  return (
    <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 20, marginBottom: 34 }}>
