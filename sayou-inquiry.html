<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAYOU | 상담 문의</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%233B3B3B'/%3E%3Ctext x='32' y='40' font-size='32' font-weight='700' fill='%23C0C0C0' text-anchor='middle' font-family='serif'%3ES%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<style>
  @font-face {
    font-family: 'Pretendard';
    src: url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/woff2/PretendardVariable.woff2') format('woff2-variations');
    font-weight: 45 920;
  }

  :root{
    --bg: #ffffff;
    --ink: #1a1a1a;
    --ink-soft: #4a4643;
    --line: #dcd7d1;
    --line-strong: #1a1a1a;
    --muted: #9a938c;
    --error: #b3452c;
    --focus-bg: #faf9f7;
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0;
    padding:0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Malgun Gothic', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  .page{
    min-height: 100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding: 88px 24px 96px;
  }

  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-bottom: 8px;
  }

  .brand img{
    width: 240px;
    height:auto;
    display:block;
  }

  .eyebrow{
    margin-top: 34px;
    font-size: 12px;
    letter-spacing: 0.32em;
    color: var(--muted);
    font-weight: 500;
    text-transform: uppercase;
  }

  .title{
    margin: 34px 0 0;
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  .subtitle{
    margin: 10px 0 0;
    font-size: 14px;
    line-height: 1.6;
    color: var(--ink-soft);
    text-align:center;
    max-width: 460px;
  }

  form{
    width: 100%;
    max-width: 440px;
    margin-top: 56px;
  }

  .field{
    position: relative;
    margin-bottom: 34px;
  }

  .field label{
    display:block;
    font-size: 13px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 10px;
    letter-spacing: -0.01em;
  }

  .field label .req{
    color: var(--error);
    margin-left: 3px;
  }

  .field input{
    width: 100%;
    border: none;
    border-bottom: 1px solid var(--line);
    background: transparent;
    padding: 10px 2px 12px;
    font-size: 15px;
    font-family: inherit;
    color: var(--ink);
    outline: none;
    transition: border-color 0.25s ease, background 0.25s ease;
  }

  .field input::placeholder{
    color: var(--muted);
    font-weight: 400;
  }

  .field input:focus{
    border-bottom: 1px solid var(--line-strong);
    background: var(--focus-bg);
  }

  .field input:invalid.touched{
    border-bottom: 1px solid var(--error);
  }

  .field .errmsg{
    display:none;
    font-size: 12px;
    color: var(--error);
    margin-top: 8px;
  }

  .field.has-error .errmsg{
    display:block;
  }

  .actions{
    margin-top: 12px;
    display:flex;
    justify-content:center;
  }

  button.submit{
    appearance:none;
    border:none;
    cursor:pointer;
    background: var(--ink);
    color: #fff;
    font-family: inherit;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    padding: 16px 56px;
    border-radius: 2px;
    transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }

  button.submit:hover{
    background: #000;
    box-shadow: 0 8px 20px rgba(0,0,0,0.18);
    transform: translateY(-1px);
  }

  button.submit:active{
    transform: translateY(0);
    box-shadow: none;
  }

  button.submit:disabled{
    opacity: 0.5;
    cursor: default;
    transform:none;
    box-shadow:none;
  }

  .note{
    margin-top: 20px;
    font-size: 12px;
    color: var(--muted);
    text-align:center;
    line-height: 1.6;
  }

  /* success state */
  .success{
    display:none;
    width: 100%;
    max-width: 440px;
    margin-top: 72px;
    text-align:center;
    flex-direction:column;
    align-items:center;
  }

  .success.show{
    display:flex;
  }

  .success .mark{
    width: 46px;
    height:46px;
    border-radius:50%;
    border: 1px solid var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom: 24px;
  }

  .success .mark svg{
    width: 18px;
    height:18px;
  }

  .success h2{
    font-size: 18px;
    font-weight:600;
    margin:0 0 10px;
  }

  .success p{
    font-size: 14px;
    color: var(--ink-soft);
    line-height:1.7;
    margin:0 0 32px;
  }

  .success button.reset{
    appearance:none;
    background:transparent;
    border:1px solid var(--line-strong);
    color: var(--ink);
    font-family:inherit;
    font-size:13px;
    font-weight:600;
    padding: 12px 28px;
    border-radius:2px;
    cursor:pointer;
    transition: background 0.2s ease, color 0.2s ease;
  }

  .success button.reset:hover{
    background: var(--ink);
    color:#fff;
  }

  form.hide{
    display:none;
  }

  @media (max-width: 480px){
    .page{ padding: 56px 20px 72px; }
    .brand img{ width: 190px; }
    form{ margin-top: 44px; }
  }
</style>
</head>

  <h1 class="title">상담 문의</h1>
  <p class="subtitle">아래 정보를 남겨주시면 담당자가 확인 후 빠르게 연락드리겠습니다.</p>

  <form id="inquiryForm" novalidate>

    <div class="field" data-field="name">
      <label for="name">성함<span class="req">*</span></label>
      <input type="text" id="name" name="name" placeholder="이름을 입력해주세요" required>
      <div class="errmsg">성함을 입력해주세요.</div>
    </div>

    <div class="field" data-field="phone">
      <label for="phone">전화번호<span class="req">*</span></label>
      <input type="tel" id="phone" name="phone" placeholder="010-0000-0000" required pattern="^[0-9\-]{9,14}$" inputmode="numeric">
      <div class="errmsg">올바른 전화번호를 입력해주세요. (숫자와 하이픈만 입력 가능)</div>
    </div>

    <div class="field" data-field="email">
      <label for="email">메일주소<span class="req">*</span></label>
      <input type="email" id="email" name="email" placeholder="example@email.com" required>
      <div class="errmsg">올바른 이메일 주소를 입력해주세요.</div>
    </div>

    <div class="field" data-field="address">
      <label for="address">현장주소<span class="req">*</span></label>
      <input type="text" id="address" name="address" placeholder="시공 예정 현장 주소를 입력해주세요" required>
      <div class="errmsg">현장주소를 입력해주세요.</div>
    </div>

    <div class="field" data-field="purpose">
      <label for="purpose">용도</label>
      <input type="text" id="purpose" name="purpose" placeholder="예: 주거, 상업공간, 사무실 등">
      <div class="errmsg"></div>
    </div>

    <div class="field" data-field="budget">
      <label for="budget">예산 <span style="font-weight: 400; color: var(--muted);">(숫자만 입력 가능)</span></label>
      <input type="text" id="budget" name="budget" placeholder="예: 50000000" inputmode="numeric">
      <div class="errmsg">숫자만 입력해주세요.</div>
    </div>

    <div class="actions">
      <button type="submit" class="submit" id="submitBtn">문의하기</button>
    </div>

    <p class="note">남겨주신 정보는 상담 목적 이외에는 사용되지 않습니다.</p>

  </form>

  <div class="success" id="successPanel">
    <div class="mark">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 12.5L9.5 18L20 6" stroke="#1a1a1a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <h2>문의가 접수되었습니다</h2>
    <p>남겨주신 연락처로<br>빠른 시일 내에 담당자가 연락드리겠습니다.</p>
    <button class="reset" id="resetBtn">다시 작성하기</button>
  </div>

</div>

<script>
  // ------------------------------------------------------------------
  // NOTION 연동 안내
  // 이 페이지는 정적 프론트엔드이므로 브라우저에서 Notion API를 직접
  // 호출할 수 없습니다 (Notion Integration Token을 브라우저에 노출하면
  // 안되고, CORS도 막혀 있습니다). 실제로 "문의하기"를 눌렀을 때
  // Notion 데이터베이스에 새 행이 자동 생성되게 하려면 아래 SUBMIT_ENDPOINT에
  // 중계 역할을 하는 서버/자동화 주소를 넣어야 합니다. 예:
  //   1) Make.com 또는 Zapier의 Webhook -> "Notion: Create Database Item" 시나리오
  //   2) Vercel/Netlify/Cloudflare Worker 같은 서버리스 함수에서 Notion API 호출
  // SUBMIT_ENDPOINT가 비어 있으면(현재 상태) 데모 모드로 동작하여
  // 화면상으로만 접수 완료 화면을 보여줍니다.
  // ------------------------------------------------------------------
  const SUBMIT_ENDPOINT = 'https://sayoudesign.dmsql0928.workers.dev/inquiry'; // Cloudflare Worker 엔드포인트

  const form = document.getElementById('inquiryForm');
  const successPanel = document.getElementById('successPanel');
  const submitBtn = document.getElementById('submitBtn');
  const resetBtn = document.getElementById('resetBtn');

  const messages = {
    name: '성함을 입력해주세요.',
    phone: '올바른 전화번호를 입력해주세요. (예: 010-0000-0000)',
    email: '올바른 이메일 주소를 입력해주세요.',
    address: '현장주소를 입력해주세요.'
  };

  function validateField(input){
    const fieldEl = input.closest('.field');
    input.classList.add('touched');
    const valid = input.checkValidity();
    fieldEl.classList.toggle('has-error', !valid);
    return valid;
  }

  form.querySelectorAll('input').forEach(input => {
    // 전화번호: 숫자와 하이픈만
    if (input.name === 'phone') {
      input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9\-]/g, '');
      });
    }
    // 예산: 숫자만
    if (input.name === 'budget') {
      input.addEventListener('input', (e) => {
        e.target.value = e.target.value.replace(/[^0-9]/g, '');
      });
    }

    input.addEventListener('blur', () => validateField(input));
    input.addEventListener('input', () => {
      if (input.classList.contains('touched')) validateField(input);
    });
  });

  form.addEventListener('submit', async (e) => {
    e.preventDefault();

    const requiredInputs = form.querySelectorAll('input[required]');
    let allValid = true;
    requiredInputs.forEach(input => {
      if (!validateField(input)) allValid = false;
    });
    if (!allValid){
      const firstError = form.querySelector('.has-error input');
      if (firstError) firstError.focus();
      return;
    }

    const payload = {
      name: form.name.value.trim(),
      phone: form.phone.value.trim(),
      email: form.email.value.trim(),
      address: form.address.value.trim(),
      purpose: form.purpose.value.trim(),
      budget: form.budget.value.trim(),
      submittedAt: new Date().toISOString()
    };

    submitBtn.disabled = true;
    submitBtn.textContent = '전송 중...';

    try {
      if (SUBMIT_ENDPOINT) {
        const response = await fetch(SUBMIT_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || `서버 오류: ${response.status}`);
        }

        console.log('[성공] Notion 저장 완료:', result);
      } else {
        // 데모 모드: 실제 전송 없이 접수 화면만 표시
        console.log('[데모 모드] 아래 데이터를 Notion으로 전송해야 합니다:', payload);
        await new Promise(res => setTimeout(res, 500));
      }
      form.classList.add('hide');
      successPanel.classList.add('show');
    } catch (err){
      console.error('전송 실패', err);
      alert('전송 중 문제가 발생했습니다. 잠시 후 다시 시도해주세요.');
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = '문의하기';
    }
  });

  resetBtn.addEventListener('click', () => {
    form.reset();
    form.querySelectorAll('.field').forEach(f => f.classList.remove('has-error'));
    form.querySelectorAll('input').forEach(i => i.classList.remove('touched'));
    successPanel.classList.remove('show');
    form.classList.remove('hide');
  });
</script>

</body>
</html>
